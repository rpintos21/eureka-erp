<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Eureka! ERP v91</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc, runTransaction };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.nextFolio = (d.exists()) ? Number(d.data().lastFolio) : 1000;
            renderPreview();
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.name.localeCompare(b.name));
            updateUI();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin: 0; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; outline: none; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        /* HOJA DINÁMICA: No más ancho fijo en pantalla */
        .pdf-page { 
            background: white !important; 
            color: #1e293b !important; 
            width: 100%; 
            max-width: 800px;
            min-height: 1000px;
            padding: 5% 7%; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            margin: 0 auto;
        }

        /* Lupa Modal */
        #quick-view-modal { position: fixed; inset: 0; background: #020617; z-index: 2000; display: none; flex-direction: column; }
        #qv-body { flex: 1; overflow: auto; padding: 10px; -webkit-overflow-scrolling: touch; }

        .btn-action { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #1e293b; color: white; }
    </style>
</head>
<body>

    <nav class="flex bg-slate-950 sticky top-0 z-[100] border-b border-slate-800">
        <button onclick="navTo('edit')" id="m-edit" class="flex-1 p-4 font-black text-[10px] uppercase text-blue-500 border-b-2 border-blue-500">Cotizar</button>
        <button onclick="navTo('hist')" id="m-hist" class="flex-1 p-4 font-black text-[10px] uppercase text-slate-500">Historial</button>
        <button onclick="navTo('clients')" id="m-clients" class="flex-1 p-4 font-black text-[10px] uppercase text-slate-500">Clientes</button>
    </nav>

    <div id="quick-view-modal">
        <div class="p-4 bg-slate-900 flex justify-between items-center border-b border-slate-800">
            <button onclick="closeQuickView()" class="bg-red-600 px-4 py-2 rounded-lg font-bold">X</button>
            <div class="flex gap-2">
                <button id="qv-share-btn" class="bg-emerald-600 px-4 py-2 rounded-lg">Enviar</button>
                <button id="qv-download-btn" class="bg-blue-600 px-4 py-2 rounded-lg">Bajar</button>
            </div>
        </div>
        <div id="qv-body"><div id="cloned-pdf-target"></div></div>
    </div>

    <div id="sec-edit" class="tab-content active">
        <div class="space-y-4 max-w-xl mx-auto">
            <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 space-y-3">
                <input type="date" id="q-date-input" class="input-dark">
                <select id="q-client" class="input-dark" onchange="checkNewClient(this)"></select>
                <input type="text" id="q-desc" placeholder="Nombre Proyecto" class="input-dark" oninput="renderPreview()">
            </div>
            
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-3">
                <textarea id="i-name" placeholder="Descripción..." class="input-dark h-20 text-sm"></textarea>
                <div class="flex gap-2">
                    <input type="number" id="i-qty" value="1" class="input-dark w-20 text-center">
                    <input type="number" id="i-price" placeholder="$" class="input-dark flex-1">
                    <button onclick="document.getElementById('f-img').click()" class="bg-slate-700 px-4 rounded-lg">📷</button>
                </div>
                <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                <button onclick="addItem()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Añadir Ítem</button>
            </div>
            
            <div id="items-list" class="space-y-2"></div>
            
            <div id="pdf-canvas" class="pdf-page mt-10"></div>
            
            <button onclick="saveAndSend()" class="w-full bg-emerald-600 py-5 rounded-2xl font-black text-lg uppercase shadow-xl">Guardar y Enviar</button>
        </div>
    </div>

    <div id="sec-hist" class="tab-content">
        <input type="text" id="search-hist" placeholder="🔍 Buscar..." class="input-dark mb-4" oninput="renderHistory()">
        <div id="history-content" class="space-y-3"></div>
    </div>

    <div id="sec-clients" class="tab-content">
        <div class="bg-slate-800 p-4 rounded-xl space-y-2 mb-4">
            <input type="text" id="c-name" placeholder="Nombre" class="input-dark">
            <input type="text" id="c-phone" placeholder="WhatsApp" class="input-dark">
            <button onclick="saveClient()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Guardar</button>
        </div>
        <div id="clients-list" class="space-y-2"></div>
    </div>

    <script>
        let items = [], tempImg = null, editingId = null;
        document.getElementById('q-date-input').valueAsDate = new Date();

        function navTo(sec) {
            ['edit', 'hist', 'clients'].forEach(s => {
                document.getElementById('sec-'+s).classList.toggle('active', s === sec);
                document.getElementById('m-'+s).classList.toggle('text-blue-500', s === sec);
                document.getElementById('m-'+s).classList.toggle('border-b-2', s === sec);
            });
            window.scrollTo(0,0);
        }

        function getBaseHTML(folio, client, date, itemsArr, desc) {
            const n = itemsArr.reduce((s,i) => s + i.total, 0), v = Math.round(n * 0.19);
            return `
                <div style="flex: 1;">
                    <div style="display:flex; justify-content:space-between; border-bottom: 3px solid #0f172a; padding-bottom: 10px; margin-bottom: 20px;">
                        <img src="logo.png" style="height:50px;">
                        <div style="text-align:right;">
                            <h2 style="font-size:16px; font-weight:900; margin:0;">COT-${folio}</h2>
                            <small style="color:#64748b;">${date}</small>
                        </div>
                    </div>
                    <div style="background:#f8fafc; padding:10px; border-radius:8px; margin-bottom:20px;">
                        <p style="font-size:9px; margin:0; color:#64748b;">CLIENTE:</p>
                        <b style="font-size:14px; text-transform:uppercase;">${client || '---'}</b>
                        <p style="font-size:10px; margin:0;">${desc || ''}</p>
                    </div>
                    <table style="width:100%; border-collapse:collapse; font-size:11px;">
                        <thead><tr style="background:#0f172a; color:white;"><th style="padding:8px;">CANT</th><th style="text-align:left; padding:8px;">DESCRIPCIÓN</th><th style="text-align:right; padding:8px;">TOTAL</th></tr></thead>
                        <tbody>${itemsArr.map(it => `<tr style="border-bottom:1px solid #eee;"><td style="text-align:center; padding:10px;">${it.qty}</td><td style="padding:10px;">${it.name}</td><td style="text-align:right; padding:10px; font-weight:700;">$${it.total.toLocaleString('es-CL')}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
                <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; text-align:right;">
                    <p style="margin:0; font-size:12px;">Neto: $${n.toLocaleString('es-CL')}</p>
                    <p style="margin:0; font-size:12px; border-bottom:1px solid #ddd; padding-bottom:5px;">IVA (19%): $${v.toLocaleString('es-CL')}</p>
                    <h2 style="margin:5px 0 0; font-size:22px;">TOTAL: $${(n+v).toLocaleString('es-CL')}</h2>
                </div>
                <div style="margin-top:20px; font-size:9px; color:#64748b; border-top:1px solid #0f172a; padding-top:10px;">
                    <b>LABORATORIO CREATIVO EUREKA SPA</b> | www.eurekalaboratorio.cl
                </div>`;
        }

        async function openQuickView(h) {
            const modal = document.getElementById('quick-view-modal');
            const target = document.getElementById('cloned-pdf-target');
            target.innerHTML = getBaseHTML(h.folio, h.client, h.date, h.items, h.desc);
            modal.style.display = "flex";
            document.getElementById('qv-share-btn').onclick = () => generateAndSharePDF(h.folio, h.client, 'share', h);
            document.getElementById('qv-download-btn').onclick = () => generateAndSharePDF(h.folio, h.client, 'save', h);
        }

        function closeQuickView() { document.getElementById('quick-view-modal').style.display = "none"; }

        async function generateAndSharePDF(folio, clientName, mode, manualData = null) {
            const d = manualData || { folio: editingId ? window.currentFolio : window.nextFolio, client: document.getElementById('q-client').value, date: new Date().toLocaleDateString('es-CL'), items: [...items], desc: document.getElementById('q-desc').value };
            const temp = document.createElement('div');
            temp.className = "pdf-page";
            temp.style = "position:absolute; left:-5000px; width:794px; min-height:1122px;";
            temp.innerHTML = getBaseHTML(d.folio, d.client, d.date, d.items, d.desc);
            document.body.appendChild(temp);

            await new Promise(r => setTimeout(r, 400));
            const opt = { margin:0, filename:`COT_${d.folio}.pdf`, image:{type:'jpeg', quality:0.95}, html2canvas:{scale:1.5, useCORS:true}, jsPDF:{unit:'mm', format:'a4'} };
            
            try {
                const worker = html2pdf().from(temp).set(opt);
                if(mode==='share' && navigator.share) {
                    const blob = await worker.output('blob');
                    await navigator.share({ files:[new File([blob], `COT_${d.folio}.pdf`, {type:'application/pdf'})] });
                } else await worker.save();
            } finally { document.body.removeChild(temp); }
        }

        async function saveAndSend() {
            const c = document.getElementById('q-client').value; if(!c || items.length === 0) return alert("Faltan datos");
            let f = editingId ? window.currentFolio : window.nextFolio;
            if(!editingId) {
                await fb.runTransaction(fb.db, async (t) => {
                    const snap = await t.get(fb.doc(fb.db, "config", "eureka_erp_v10"));
                    f = snap.exists() ? snap.data().lastFolio : 1000;
                    t.update(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: f + 1 });
                });
            }
            const data = { folio: f, client: c, items, date: new Date().toLocaleDateString('es-CL'), desc: document.getElementById('q-desc').value };
            if(editingId) await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data);
            else await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
            await generateAndSharePDF(f, c, 'share');
            items = []; editingId = null; renderPreview();
        }

        function renderHistory() {
            const s = document.getElementById('search-hist').value.toLowerCase();
            const f = (window.historial || []).filter(h => h.client.toLowerCase().includes(s) || h.folio.toString().includes(s));
            document.getElementById('history-content').innerHTML = f.map(h => `
                <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center border-l-4 border-blue-500">
                    <div><b>${h.client}</b><br><small>#${h.folio}</small></div>
                    <div class="flex gap-2">
                        <button onclick='openQuickView(${JSON.stringify(h)})' class="btn-action">🔍</button>
                        <button onclick="if(confirm('¿Borrar?')) fb.deleteDoc(fb.doc(fb.db,'erp_cotizaciones','${h.id}'))" class="btn-action">🗑️</button>
                    </div>
                </div>`).join('');
        }
        function updateUI() {
            const sel = document.getElementById('q-client');
            sel.innerHTML = '<option value="">-- CLIENTE --</option><option value="NEW">+ NUEVO</option>';
            (window.clientes || []).forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            document.getElementById('clients-list').innerHTML = (window.clientes || []).map(c => `<div class="bg-slate-800 p-3 rounded flex justify-between"><b>${c.name}</b><button onclick="fb.deleteDoc(fb.doc(fb.db,'erp_clientes','${c.id}'))" class="text-red-400">🗑️</button></div>`).join('');
        }
        function renderPreview() {
            document.getElementById('pdf-canvas').innerHTML = getBaseHTML(editingId ? window.currentFolio : (window.nextFolio || 1000), document.getElementById('q-client').value, new Date().toLocaleDateString('es-CL'), items, document.getElementById('q-desc').value);
            document.getElementById('items-list').innerHTML = items.map((it, i) => `<div class="bg-slate-800 p-3 rounded flex justify-between items-center text-xs"><span>${it.name}</span><button onclick="items.splice(${i},1);renderPreview();" class="text-red-500">X</button></div>`).join('');
        }
        function addItem() { const n=document.getElementById('i-name').value.toUpperCase(), p=Number(document.getElementById('i-price').value), q=Number(document.getElementById('i-qty').value); if(!n || p<=0) return; items.push({name:n, price:p, qty:q, total:p*q}); document.getElementById('i-name').value=""; document.getElementById('i-price').value=""; renderPreview(); }
        function handleImg(i) { if(i.files[0]) { const r=new FileReader(); r.onload=e=>{tempImg=e.target.result; renderPreview();}; r.readAsDataURL(i.files[0]); } }
        async function saveClient() { const data={name:document.getElementById('c-name').value.toUpperCase(), phone:document.getElementById('c-phone').value}; if(data.name) await fb.addDoc(fb.collection(fb.db, "erp_clientes"), data); ['c-name','c-phone'].forEach(id=>document.getElementById(id).value=''); navTo('edit'); }
        function checkNewClient(el) { if(el.value==="NEW") { navTo('clients'); el.value=""; } else renderPreview(); }
    </script>
</body>
</html>
