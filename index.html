<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eureka! Lab ERP v36</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.currentFolio = (d.exists() && d.data().lastFolio) ? Number(d.data().lastFolio) : 1000;
            renderPreview();
        }, (err) => { window.currentFolio = 1000; });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateUI();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; font-size: 14px; }
        .tab-btn { padding: 16px; flex: 1; text-align: center; font-weight: 800; font-size: 10px; color: #64748b; border-bottom: 2px solid transparent; text-transform: uppercase; }
        .tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: #1e293b; }
        
        /* HOJA A4 ESTRICTA */
        #preview-pane { background: #0f172a; overflow: auto; padding: 20px; display: flex; justify-content: center; }
        #pdf-canvas { 
            background: white; color: #1e293b; 
            width: 210mm; min-height: 297mm; 
            padding: 15mm; flex-shrink: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 1024px) {
            #pdf-canvas { transform: scale(0.45); transform-origin: top center; margin-bottom: -160mm; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="flex bg-slate-900 border-b border-slate-800 shrink-0">
        <button onclick="setTab('edit')" id="tab-edit" class="tab-btn tab-active">Cotizador</button>
        <button onclick="setTab('hist')" id="tab-hist" class="tab-btn">Historial</button>
        <button onclick="setTab('clients')" id="tab-clients" class="tab-btn">Clientes</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        <aside class="lg:w-1/3 bg-slate-900 overflow-y-auto p-4 space-y-4 border-r border-slate-800">
            <div id="panel-edit" class="space-y-4">
                <div class="space-y-2 bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                    <input type="date" id="q-date-input" class="input-dark" oninput="renderPreview()">
                    <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                    <input type="text" id="q-desc" placeholder="Asunto / Proyecto" class="input-dark" oninput="renderPreview()">
                </div>

                <div id="item-box" class="bg-slate-800 p-4 rounded-2xl border-2 border-blue-600/30 space-y-3 transition-all">
                    <p id="item-mode-label" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Añadir Nuevo Ítem</p>
                    <textarea id="i-name" placeholder="Descripción del producto..." class="input-dark h-20 resize-none"></textarea>
                    <div class="flex gap-2">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center w-20">
                        <input type="number" id="i-price" placeholder="$ Precio" class="input-dark flex-1">
                        <button onclick="document.getElementById('f-img').click()" id="b-img" class="bg-slate-700 px-4 rounded-xl text-xl border border-slate-600">📷</button>
                    </div>
                    <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                    <button id="btn-item-main" onclick="addItem()" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase text-xs">Insertar Ítem</button>
                    <button id="btn-cancel-edit" onclick="cancelItemEdit()" class="hidden w-full bg-slate-700 py-2 rounded-xl font-bold uppercase text-[10px] text-slate-400">Cancelar Edición</button>
                </div>

                <div id="items-list" class="space-y-2"></div>
                <button onclick="saveAndSend()" class="w-full bg-emerald-500 py-5 rounded-2xl font-black text-lg uppercase shadow-xl">Guardar y Enviar</button>
            </div>

            <div id="panel-hist" class="hidden space-y-3 p-2"></div>
            <div id="panel-clients" class="hidden space-y-4 p-2">
                <div class="bg-slate-800 p-4 rounded-xl">
                    <input type="text" id="c-new" placeholder="Nombre de Cliente" class="input-dark mb-2">
                    <button onclick="saveClient()" id="btn-client-save" class="w-full bg-blue-600 py-2 rounded-lg font-bold">REGISTRAR</button>
                </div>
                <div id="clients-list" class="space-y-2"></div>
            </div>
        </aside>

        <main id="preview-pane" class="lg:w-2/3">
            <div id="pdf-canvas">
                <div style="display:flex; justify-content:space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 4px solid #0f172a; padding-bottom: 20px;">
                    <div><img src="logo.png" style="height:80px; width: auto; display: block;"></div>
                    <div style="text-align:right;">
                        <h2 id="p-folio" style="font-size:16px; font-weight:900; margin:0; color: #0f172a;">---</h2>
                        <p style="font-size:11px; margin:5px 0 0; color: #64748b; font-weight: 700;">FECHA: <span id="p-date" style="color:#0f172a"></span></p>
                    </div>
                </div>

                <div style="margin-bottom: 25px; font-size: 12px; background: #f1f5f9; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                    <p style="font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px;">CLIENTE / RECEPTOR:</p>
                    <b id="p-client" style="font-size: 15px; text-transform: uppercase; color: #0f172a;">---</b>
                </div>

                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr style="background: #0f172a; color: white;">
                            <th style="padding: 12px; text-align: center; font-size: 10px; width: 40px;">CANT</th>
                            <th style="padding: 12px; text-align: left; font-size: 10px;">DESCRIPCIÓN</th>
                            <th style="padding: 12px; text-align: center; font-size: 10px; width: 140px;">REF. VISUAL</th>
                            <th style="padding: 12px; text-align: right; font-size: 10px; width: 100px;">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top: 30px; display: flex; justify-content: flex-end;">
                    <div style="width: 250px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                            <span>Neto:</span><b id="p-sub">$0</b>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #cbd5e1;">
                            <span>IVA (19%):</span><b id="p-iva">$0</b>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 10px; font-weight: 900; color: #3b82f6;">TOTAL</span>
                            <h2 id="p-total" style="font-size: 28px; font-weight: 900; margin: 0; color: #0f172a;">$0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], tempImg = null, editingId = null, editingItemIdx = null;
        document.getElementById('q-date-input').valueAsDate = new Date();

        function setTab(t) {
            ['edit', 'hist', 'clients'].forEach(s => {
                document.getElementById('panel-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            document.getElementById('preview-pane').classList.toggle('hidden', t !== 'edit');
        }

        function handleImg(input) {
            if (!input.files[0]) return;
            const r = new FileReader();
            r.onload = e => { tempImg = e.target.result; document.getElementById('b-img').innerHTML = "✅"; };
            r.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const n = document.getElementById('i-name').value.toUpperCase();
            const p = Number(document.getElementById('i-price').value);
            const q = Number(document.getElementById('i-qty').value);
            if(!n || p <= 0) return alert("Completa descripción y precio");

            if(editingItemIdx !== null) {
                items[editingItemIdx] = { name: n, price: p, qty: q, total: p*q, img: tempImg || items[editingItemIdx].img };
                cancelItemEdit();
            } else {
                items.push({ name: n, price: p, qty: q, total: p*q, img: tempImg });
            }
            
            resetItemForm();
            renderPreview();
        }

        function resetItemForm() {
            document.getElementById('i-name').value = "";
            document.getElementById('i-price').value = "";
            document.getElementById('i-qty').value = "1";
            tempImg = null;
            document.getElementById('b-img').innerHTML = "📷";
        }

        function startItemEdit(idx) {
            editingItemIdx = idx;
            const it = items[idx];
            document.getElementById('i-name').value = it.name;
            document.getElementById('i-price').value = it.price;
            document.getElementById('i-qty').value = it.qty;
            document.getElementById('item-box').classList.replace('border-blue-600/30', 'border-orange-500');
            document.getElementById('item-mode-label').innerText = "⚠️ MODO EDICIÓN";
            document.getElementById('item-mode-label').classList.replace('text-blue-400', 'text-orange-500');
            document.getElementById('btn-item-main').innerText = "Guardar Cambios";
            document.getElementById('btn-item-main').classList.replace('bg-blue-600', 'bg-orange-500');
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            window.scrollTo({top: 0, behavior:'smooth'});
        }

        function cancelItemEdit() {
            editingItemIdx = null;
            resetItemForm();
            document.getElementById('item-box').classList.replace('border-orange-500', 'border-blue-600/30');
            document.getElementById('item-mode-label').innerText = "Añadir Nuevo Ítem";
            document.getElementById('item-mode-label').classList.replace('text-orange-500', 'text-blue-400');
            document.getElementById('btn-item-main').innerText = "Insertar Ítem";
            document.getElementById('btn-item-main').classList.replace('bg-orange-500', 'bg-blue-600');
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        function renderPreview() {
            const dInput = document.getElementById('q-date-input').value;
            document.getElementById('p-date').innerText = dInput ? new Date(dInput+'T12:00:00').toLocaleDateString('es-CL') : '---';
            document.getElementById('p-client').innerText = document.getElementById('q-client').value || '---';
            const f = window.currentFolio || 1000, desc = document.getElementById('q-desc').value.toUpperCase() || 'COTIZACIÓN';
            document.getElementById('p-folio').innerText = `COT-${f} | ${desc}`;

            const b = document.getElementById('p-body');
            b.innerHTML = items.map(it => `
                <tr style="border-bottom: 1px solid #e2e8f0;">
                    <td style="padding: 15px; text-align: center; font-weight: 800;">${it.qty}</td>
                    <td style="padding: 15px; font-size: 11px; line-height: 1.4; color: #1e293b; white-space: pre-wrap;">${it.name}</td>
                    <td style="padding: 10px; text-align: center;">
                        ${it.img ? `<img src="${it.img}" style="max-height: 45mm; max-width: 40mm; object-fit: contain; border-radius: 6px;">` : ''}
                    </td>
                    <td style="padding: 15px; text-align: right; font-weight: 900; color: #0f172a;">$${it.total.toLocaleString('es-CL')}</td>
                </tr>
            `).join('');

            const n = items.reduce((s,i) => s + i.total, 0), v = Math.round(n * 0.19);
            document.getElementById('p-sub').innerText = `$${n.toLocaleString('es-CL')}`;
            document.getElementById('p-iva').innerText = `$${v.toLocaleString('es-CL')}`;
            document.getElementById('p-total').innerText = `$${(n + v).toLocaleString('es-CL')}`;
            
            document.getElementById('items-list').innerHTML = items.map((it, i) => `
                <div class="flex justify-between bg-slate-800 p-2 rounded border border-slate-700 items-center">
                    <span class="text-xs font-bold truncate w-2/3">${it.name}</span>
                    <div class="flex gap-2">
                        <button onclick="startItemEdit(${i})" class="text-blue-400 p-2">✏️</button>
                        <button onclick="items.splice(${i},1);renderPreview();" class="text-red-500 p-2">✕</button>
                    </div>
                </div>`).join('');
        }

        async function saveAndSend() {
            const c = document.getElementById('q-client').value;
            if(!c || items.length === 0) return alert("Faltan datos");
            const f = window.currentFolio || 1000, d = document.getElementById('q-desc').value.toUpperCase();
            const filename = `COT_${f}_${c}`;

            try {
                const data = { folio: f, folioCode: filename, client: c, items: items, date: document.getElementById('q-date-input').value, neto: items.reduce((s,i)=>s+i.total,0) };
                if(editingId) { await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data); }
                else {
                    await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) });
                    await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
                }

                const opt = { 
                    margin: 0, filename: filename+'.pdf', 
                    image: { type: 'jpeg', quality: 1 },
                    html2canvas: { scale: 3, useCORS: true, logging: false, letterRendering: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                const worker = html2pdf().from(document.getElementById('pdf-canvas')).set(opt);
                const blob = await worker.output('blob');
                const file = new File([blob], filename+'.pdf', { type: 'application/pdf' });

                if (navigator.share) { await navigator.share({ files: [file], title: filename }).catch(()=>worker.save()); }
                else { worker.save(); }
                
                alert("¡Proceso completado!");
            } catch (e) { alert("Error: " + e.message); }
        }

        function updateUI() {
            const sel = document.getElementById('q-client'); 
            sel.innerHTML = '<option value="">-- SELECCIONAR CLIENTE --</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `
                <div class="bg-slate-800 p-3 rounded flex justify-between items-center border border-slate-700">
                    <b class="text-sm uppercase">${c.name}</b>
                    <button onclick="fb.deleteDoc(fb.doc(fb.db,'erp_clientes','${c.id}'))" class="text-red-500 font-bold">✕</button>
                </div>`).join('');
        }

        async function saveClient() {
            const n = document.getElementById('c-new').value.toUpperCase();
            if(n) await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name: n });
            document.getElementById('c-new').value = "";
        }

        function renderHistory() {
            document.getElementById('panel-hist').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-4 rounded border-l-4 border-emerald-500 mb-2">
                    <p class="text-[9px] opacity-40 font-bold">${h.folioCode}</p>
                    <p class="font-bold text-sm uppercase">${h.client}</p>
                    <div class="flex justify-between mt-2">
                        <b class="text-emerald-400">$${Math.round(h.neto*1.19).toLocaleString()}</b>
                        <button onclick="loadEdit('${h.id}')" class="bg-blue-600 px-3 py-1 rounded text-xs font-bold">EDITAR</button>
                    </div>
                </div>`).join('');
        }

        function loadEdit(id) {
            const h = window.historial.find(x => x.id === id);
            items = [...h.items]; editingId = id;
            document.getElementById('q-client').value = h.client;
            document.getElementById('q-date-input').value = h.date;
            setTab('edit'); renderPreview();
        }
    </script>
</body>
</html>
