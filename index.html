<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka! Lab ERP v14 - Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc };

        // Recuperar Correlativo
        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.lastFolio = d.exists() ? d.data().lastFolio : 1000;
            renderPreview();
        });

        // Recuperar Clientes
        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientesData = s.docs.map(d => d.data().name);
            const sel = document.getElementById('q-client');
            sel.innerHTML = '<option value="">Seleccionar Cliente</option><option value="NEW">+ Nuevo Cliente</option>';
            window.clientesData.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        });

        // Recuperar Historial
        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => d.data()).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .canvas-pdf { background: white; color: #334; width: 210mm; min-height: 297mm; padding: 15mm; margin: auto; transform: scale(0.5); transform-origin: top center; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        @media (min-width: 1024px) { .canvas-pdf { transform: scale(0.8); } }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; width: 100%; color: white; }
        .btn-nav { padding: 10px; flex: 1; text-align: center; font-weight: bold; font-size: 12px; }
        .active-nav { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body>

    <div class="flex flex-col lg:flex-row h-screen">
        <aside class="lg:w-1/3 bg-slate-900 border-r border-slate-800 flex flex-col">
            <nav class="flex border-b border-slate-800">
                <button onclick="setTab('edit')" id="tab-edit" class="btn-nav active-nav">EDITOR</button>
                <button onclick="setTab('hist')" id="tab-hist" class="btn-nav">HISTORIAL</button>
            </nav>

            <div id="panel-edit" class="p-6 overflow-y-auto flex-1">
                <div class="space-y-4">
                    <img src="logo.png" class="h-12 mx-auto mb-4" onerror="this.style.display='none'">
                    
                    <select id="q-client" class="input-dark" onchange="if(this.value==='NEW') addClient(); renderPreview();"></select>
                    <input type="text" id="q-desc-folio" placeholder="Descripción: Ej. Letrero Neón" class="input-dark" oninput="renderPreview()">

                    <div class="bg-slate-800 p-4 rounded-xl space-y-3">
                        <input type="text" id="i-desc" placeholder="Producto" class="input-dark">
                        <div class="grid grid-cols-3 gap-2">
                            <input type="number" id="i-qty" value="1" class="input-dark">
                            <input type="number" id="i-price" placeholder="$ Precio" class="input-dark">
                            <button onclick="document.getElementById('f-img').click()" id="btn-img" class="bg-slate-700 rounded-lg">📷</button>
                        </div>
                        <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                        <button onclick="addItem()" class="w-full bg-blue-600 py-2 rounded-lg font-bold">+ AÑADIR</button>
                    </div>

                    <div id="list-items" class="space-y-2"></div>
                    
                    <button onclick="saveAll()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-lg shadow-lg">GUARDAR Y DESCARGAR PDF</button>
                </div>
            </div>

            <div id="panel-hist" class="p-6 overflow-y-auto flex-1 hidden">
                <div id="hist-content" class="space-y-3"></div>
            </div>
        </aside>

        <main class="lg:w-2/3 bg-slate-950 overflow-y-auto p-4 flex justify-center">
            <div id="pdf-area" class="canvas-pdf">
                <div style="display:flex; justify-content:space-between; border-bottom:5px solid #0f172a; padding-bottom:20px; margin-bottom:20px">
                    <div>
                        <img src="logo.png" style="height:80px">
                        <h1 style="font-size:28px; margin:0">EUREKA! LAB</h1>
                        <p style="font-size:12px; color:#666">Diseño y Producción</p>
                    </div>
                    <div style="text-align:right">
                        <div style="background:#0f172a; color:white; padding:10px; border-radius:0 0 0 20px">
                            <p style="font-size:10px; margin:0">COTIZACIÓN CORRELATIVA</p>
                            <h2 id="p-folio" style="margin:0; font-size:16px">COT_EUREKALAB-1000 - ...</h2>
                        </div>
                        <p style="margin-top:10px; font-size:14px"><b>Fecha:</b> <span id="p-date"></span></p>
                        <p style="font-size:14px"><b>Cliente:</b> <span id="p-client"></span></p>
                    </div>
                </div>

                <table style="width:100%; border-collapse:collapse">
                    <thead>
                        <tr style="background:#f4f4f5; font-size:12px">
                            <th style="padding:10px; text-align:left">IMG</th>
                            <th style="padding:10px; text-align:left">DESCRIPCIÓN</th>
                            <th style="padding:10px; text-align:center">CANT</th>
                            <th style="padding:10px; text-align:right">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top:30px; text-align:right">
                    <h2 style="font-size:35px; margin:0">TOTAL: <span id="p-total">$0</span></h2>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], tempImg = null;

        function setTab(t) {
            document.getElementById('panel-edit').classList.toggle('hidden', t!=='edit');
            document.getElementById('panel-hist').classList.toggle('hidden', t!=='hist');
            document.getElementById('tab-edit').classList.toggle('active-nav', t==='edit');
            document.getElementById('tab-hist').classList.toggle('active-nav', t==='hist');
        }

        async function addClient() {
            const n = prompt("Nombre nuevo cliente:");
            if(n) await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name: n.toUpperCase() });
        }

        function handleImg(input) {
            const reader = new FileReader();
            reader.onload = e => { tempImg = e.target.result; document.getElementById('btn-img').innerHTML = "✅"; };
            reader.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const desc = document.getElementById('i-desc').value;
            const price = Number(document.getElementById('i-price').value);
            const qty = Number(document.getElementById('i-qty').value);
            if(!desc || price <= 0) return;
            items.push({ desc: desc.toUpperCase(), price, qty, total: price * qty, img: tempImg });
            document.getElementById('i-desc').value = ""; document.getElementById('i-price').value = "";
            tempImg = null; document.getElementById('btn-img').innerHTML = "📷";
            renderPreview();
        }

        function renderPreview() {
            document.getElementById('p-date').innerText = new Date().toLocaleDateString();
            document.getElementById('p-client').innerText = document.getElementById('q-client').value || '---';
            const d = document.getElementById('q-desc-folio').value || '---';
            const folioStr = `COT_EUREKALAB-${window.lastFolio || 1000} - ${d.toUpperCase()}`;
            document.getElementById('p-folio').innerText = folioStr;

            const tbody = document.getElementById('p-body');
            tbody.innerHTML = "";
            let total = 0;
            items.forEach((it, i) => {
                total += it.total;
                tbody.innerHTML += `
                    <tr style="border-bottom:1px solid #eee">
                        <td style="padding:10px"><img src="${it.img || ''}" style="width:40px; height:40px; object-fit:cover" onerror="this.style.display='none'"></td>
                        <td style="padding:10px"><b>${it.desc}</b></td>
                        <td style="padding:10px; text-align:center">${it.qty}</td>
                        <td style="padding:10px; text-align:right">$${it.total.toLocaleString()}</td>
                    </tr>`;
            });
            document.getElementById('p-total').innerText = `$${total.toLocaleString()}`;
            
            document.getElementById('list-items').innerHTML = items.map((it, i) => `
                <div class="flex justify-between bg-slate-800 p-2 rounded text-xs">
                    <span>${it.desc}</span>
                    <button onclick="items.splice(${i},1); renderPreview();" class="text-red-400">✕</button>
                </div>`).join('');
        }

        async function saveAll() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc-folio').value;
            if(!client || !desc || items.length === 0) return alert("Completa cliente, descripción y productos");

            const folioCode = `COT_EUREKALAB-${window.lastFolio} - ${desc.toUpperCase()}`;
            
            await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), {
                folio: window.lastFolio,
                folioCode,
                client,
                items: items.map(i => ({...i, img: null})), // No guardamos img en DB para no saturar
                total: items.reduce((s,i) => s+i.total, 0),
                date: new Date().toLocaleDateString()
            });

            await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) });

            html2pdf().from(document.getElementById('pdf-area')).set({
                margin: 0, filename: folioCode+'.pdf', html2canvas: { scale: 2 }
            }).save();

            items = []; document.getElementById('q-desc-folio').value = "";
            renderPreview();
            alert("Guardado y Folio actualizado");
        }

        function renderHistory() {
            document.getElementById('hist-content').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-3 rounded-lg border-l-4 border-blue-500">
                    <p class="text-[10px] text-slate-400 font-bold">${h.folioCode}</p>
                    <p class="font-bold text-sm">${h.client}</p>
                    <p class="text-emerald-400 font-bold">$${h.total.toLocaleString()}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
