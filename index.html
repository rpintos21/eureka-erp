<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka! ERP v17 - Professional Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc };

        // Sincronización de Configuración
        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.lastFolio = d.exists() ? d.data().lastFolio : 1000;
            renderPreview();
        });

        // Sincronización de Clientes
        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateClientSelectors();
            renderClientManager();
        });

        // Sincronización de Cotizaciones
        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; }
        .btn-tab { flex: 1; padding: 15px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; border-bottom: 2px solid #1e293b; transition: 0.3s; }
        .btn-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; background: #0f172a; }
        /* El área del PDF está oculta visualmente pero presente para el motor de PDF */
        #pdf-render-area { position: absolute; left: -9999px; top: 0; background: white; width: 210mm; padding: 15mm; color: #1e293b; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 16px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="flex bg-slate-950 border-b border-slate-800">
        <button onclick="switchTab('editor')" id="tab-editor" class="btn-tab active">📝 Cotizador</button>
        <button onclick="switchTab('historial')" id="tab-historial" class="btn-tab">📂 Historial</button>
        <button onclick="switchTab('clientes')" id="tab-clientes" class="btn-tab">👥 Clientes</button>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 lg:p-8">
        
        <section id="sec-editor" class="max-w-4xl mx-auto space-y-6">
            <div class="card space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Cliente</label>
                        <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Referencia / Título</label>
                        <input type="text" id="q-desc" placeholder="Ej: Letrero Neón Local" class="input-dark" oninput="renderPreview()">
                    </div>
                </div>
            </div>

            <div class="card border-blue-500/30">
                <h3 class="text-xs font-black uppercase mb-4 text-blue-400">Añadir Producto</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="text" id="i-name" placeholder="Producto..." class="input-dark md:col-span-2">
                    <input type="number" id="i-qty" value="1" class="input-dark text-center">
                    <input type="number" id="i-price" placeholder="$ Precio" class="input-dark">
                </div>
                <div class="flex gap-2 mt-3">
                    <button onclick="document.getElementById('f-img').click()" class="bg-slate-800 px-4 rounded-xl border border-slate-700">📷 Foto</button>
                    <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                    <button onclick="addItem()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold uppercase text-xs transition">Añadir a la lista</button>
                </div>
                <div id="items-list" class="mt-4 space-y-2"></div>
            </div>

            <div class="flex flex-col items-center py-6">
                <div class="text-4xl font-black text-white mb-4" id="view-total">$0</div>
                <button onclick="saveAndProcess()" class="w-full max-w-sm bg-emerald-500 hover:bg-emerald-400 py-4 rounded-2xl font-black uppercase shadow-lg shadow-emerald-900/20 transition">Guardar y Enviar PDF</button>
            </div>
        </section>

        <section id="sec-historial" class="max-w-4xl mx-auto hidden space-y-4"></section>

        <section id="sec-clientes" class="max-w-4xl mx-auto hidden space-y-4">
            <div class="card flex gap-2">
                <input type="text" id="new-client-name" placeholder="Nombre del nuevo cliente..." class="input-dark">
                <button onclick="addNewClient()" class="bg-blue-600 px-6 rounded-xl font-bold">Añadir</button>
            </div>
            <div id="clients-list" class="space-y-2"></div>
        </section>

    </main>

    <div id="pdf-render-area">
        <div style="display:flex; justify-content:space-between; border-bottom:4px solid #0f172a; padding-bottom:20px; margin-bottom:20px">
            <div>
                <img src="logo.png" style="height:70px; margin-bottom:10px">
                <h1 style="font-size:24px; margin:0; font-weight:900">EUREKA! LAB</h1>
                <p style="font-size:10px; color:#64748b; margin:0">DISEÑO Y PRODUCCIÓN INDUSTRIAL</p>
            </div>
            <div style="text-align:right">
                <div style="background:#0f172a; color:white; padding:10px 20px; border-radius:10px">
                    <p style="font-size:8px; margin:0; opacity:0.8">FOLIO COTIZACIÓN</p>
                    <p id="pdf-folio" style="font-size:12px; font-weight:900; margin:0"></p>
                </div>
                <p style="font-size:11px; margin-top:10px"><b>Fecha:</b> <span id="pdf-date"></span></p>
                <p style="font-size:11px"><b>Cliente:</b> <span id="pdf-client"></span></p>
            </div>
        </div>
        <table style="width:100%; border-collapse:collapse">
            <thead style="background:#f8fafc">
                <tr style="font-size:10px; text-transform:uppercase">
                    <th style="padding:10px; text-align:left">Item</th>
                    <th style="padding:10px; text-align:center">Cant</th>
                    <th style="padding:10px; text-align:right">Total</th>
                </tr>
            </thead>
            <tbody id="pdf-body"></tbody>
        </table>
        <div style="text-align:right; margin-top:30px; border-top:2px solid #f1f5f9; padding-top:20px">
            <p style="font-size:12px; color:#64748b; margin:0">TOTAL NETO</p>
            <h2 id="pdf-total" style="font-size:32px; font-weight:900; margin:0"></h2>
        </div>
    </div>

    <script>
        let items = [], tempImg = null, editingId = null;

        function switchTab(t) {
            ['editor', 'historial', 'clientes'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.toggle('hidden', s !== t);
                document.getElementById(`tab-${s}`).classList.toggle('active', s === t);
            });
        }

        function handleImg(input) {
            const reader = new FileReader();
            reader.onload = e => tempImg = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const name = document.getElementById('i-name').value.toUpperCase();
            const price = Number(document.getElementById('i-price').value);
            const qty = Number(document.getElementById('i-qty').value);
            if(!name || price <= 0) return alert("Completa el producto y precio");
            
            items.push({ name, price, qty, total: price * qty, img: tempImg });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = "";
            tempImg = null; renderPreview();
        }

        function renderPreview() {
            const total = items.reduce((s,i) => s + i.total, 0);
            document.getElementById('view-total').innerText = `$${total.toLocaleString('es-CL')}`;
            
            // Render Lista en Editor
            document.getElementById('items-list').innerHTML = items.map((it, i) => `
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl border border-slate-700">
                    <div>
                        <p class="text-sm font-bold">${it.name}</p>
                        <p class="text-[10px] text-slate-400">${it.qty} x $${it.price.toLocaleString('es-CL')}</p>
                    </div>
                    <button onclick="items.splice(${i},1); renderPreview();" class="text-red-400 p-2">✕</button>
                </div>
            `).join('');

            // Preparar PDF data
            document.getElementById('pdf-date').innerText = new Date().toLocaleDateString('es-CL');
            document.getElementById('pdf-client').innerText = document.getElementById('q-client').value || '---';
            document.getElementById('pdf-folio').innerText = `COT-${window.lastFolio || 1000}`;
            document.getElementById('pdf-total').innerText = `$${total.toLocaleString('es-CL')}`;
            
            const tbody = document.getElementById('pdf-body');
            tbody.innerHTML = items.map(it => `
                <tr style="border-bottom:1px solid #f1f5f9">
                    <td style="padding:10px; font-size:12px"><b>${it.name}</b></td>
                    <td style="padding:10px; text-align:center">${it.qty}</td>
                    <td style="padding:10px; text-align:right; font-weight:bold">$${it.total.toLocaleString('es-CL')}</td>
                </tr>
            `).join('');
        }

        async function saveAndProcess() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc').value;
            if(!client || items.length === 0) return alert("Falta cliente o productos");

            const folioCode = `COT_EUREKA-${window.lastFolio}-${desc.toUpperCase() || 'SD'}`;

            const data = {
                folio: window.lastFolio,
                folioCode, client, desc,
                items: items,
                total: items.reduce((s,i) => s+i.total,0),
                date: new Date().toLocaleDateString('es-CL')
            };

            // Guardar en Firebase
            if(editingId) {
                await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data);
                editingId = null;
            } else {
                await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
                await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) });
            }

            // Generar PDF y Compartir
            const element = document.getElementById('pdf-render-area');
            const opt = { margin: 0, filename: folioCode+'.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            
            const blob = await html2pdf().from(element).set(opt).output('blob');
            const file = new File([blob], folioCode+'.pdf', { type: 'application/pdf' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: folioCode });
            } else {
                html2pdf().from(element).set(opt).save();
            }

            items = []; document.getElementById('q-desc').value = ""; renderPreview();
            alert("Guardado con éxito");
        }

        // GESTIÓN DE CLIENTES
        function updateClientSelectors() {
            const sel = document.getElementById('q-client');
            const val = sel.value;
            sel.innerHTML = '<option value="">-- Seleccionar --</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            sel.value = val;
        }

        function renderClientManager() {
            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `
                <div class="card flex justify-between items-center py-3">
                    <span class="font-bold text-sm">${c.name}</span>
                    <button onclick="deleteClient('${c.id}')" class="text-red-500 text-xs font-black uppercase">Eliminar</button>
                </div>
            `).join('');
        }

        async function addNewClient() {
            const name = document.getElementById('new-client-name').value.toUpperCase();
            if(name) {
                await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name });
                document.getElementById('new-client-name').value = "";
            }
        }

        async function deleteClient(id) {
            if(confirm("¿Eliminar cliente?")) await fb.deleteDoc(fb.doc(fb.db, "erp_clientes", id));
        }

        // GESTIÓN DE HISTORIAL
        function renderHistory() {
            document.getElementById('sec-historial').innerHTML = window.historial.map(h => `
                <div class="card border-l-4 border-blue-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">${h.folioCode}</p>
                            <h3 class="font-black text-lg">${h.client}</h3>
                            <p class="text-emerald-400 font-bold">$${h.total.toLocaleString('es-CL')}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="editCot('${h.id}')" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">EDITAR</button>
                            <button onclick="deleteCot('${h.id}')" class="bg-red-900 px-3 py-1 rounded text-[10px] font-bold text-red-200">ELIMINAR</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editCot(id) {
            const h = window.historial.find(x => x.id === id);
            items = [...h.items];
            document.getElementById('q-client').value = h.client;
            document.getElementById('q-desc').value = h.desc || "";
            editingId = id;
            switchTab('editor');
            renderPreview();
        }

        async function deleteCot(id) {
            if(confirm("¿Seguro que quieres eliminar esta cotización para siempre?")) {
                await fb.deleteDoc(fb.doc(fb.db, "erp_cotizaciones", id));
            }
        }
    </script>
</body>
</html>
