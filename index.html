<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eureka! Lab ERP v43</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc, runTransaction };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.currentFolio = (d.exists() && d.data().lastFolio) ? Number(d.data().lastFolio) : 1000;
            renderPreview();
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateUI();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f1f5f9; margin: 0; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; font-size: 16px; }
        .tab-btn { padding: 16px; flex: 1; text-align: center; font-weight: 800; font-size: 11px; color: #64748b; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: #0f172a; }
        
        #preview-pane { background: #0f172a; overflow: auto; padding: 0; display: flex; justify-content: center; min-height: 100vh; }

        /* HOJA A4 SIN MÁRGENES GIGANTES */
        #pdf-canvas { 
            background: white; color: #1e293b; 
            width: 210mm; 
            min-height: 297mm; 
            padding: 12mm;
            flex-shrink: 0;
            box-sizing: border-box;
            position: relative;
        }

        @media (max-width: 1024px) {
            #pdf-canvas { transform: scale(0.42); transform-origin: top center; margin-bottom: -170mm; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="flex bg-slate-950 border-b border-slate-800 shrink-0">
        <button onclick="setTab('edit')" id="tab-edit" class="tab-btn tab-active">Cotizar</button>
        <button onclick="setTab('hist')" id="tab-hist" class="tab-btn">Historial</button>
        <button onclick="setTab('clients')" id="tab-clients" class="tab-btn">Clientes</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        <aside class="lg:w-1/3 bg-slate-900 overflow-y-auto p-4 space-y-4 border-r border-slate-800">
            <div id="panel-edit" class="space-y-4">
                <div class="bg-slate-800/40 p-3 rounded-xl border border-slate-700 space-y-3">
                    <input type="date" id="q-date-input" class="input-dark">
                    <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                    <input type="text" id="q-desc" placeholder="Nombre del Proyecto" class="input-dark" oninput="renderPreview()">
                </div>

                <div id="item-box" class="bg-slate-800 p-4 rounded-2xl border-2 border-blue-600/20 space-y-3 transition-all">
                    <p id="item-mode-label" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Añadir Ítem</p>
                    <textarea id="i-name" placeholder="Descripción detallada..." class="input-dark h-20 resize-none"></textarea>
                    <div class="flex gap-2">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center w-20">
                        <input type="number" id="i-price" placeholder="$ Precio" class="input-dark flex-1">
                        <button onclick="document.getElementById('f-img').click()" id="b-img" class="bg-slate-700 px-4 rounded-xl text-xl border border-slate-600">📷</button>
                    </div>
                    <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                    <button id="btn-item-main" onclick="addItem()" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase text-xs">Insertar</button>
                    <button id="btn-cancel-edit" onclick="cancelItemEdit()" class="hidden w-full bg-slate-700 py-2 rounded-xl text-[10px] uppercase">Cancelar</button>
                </div>

                <div id="items-list" class="space-y-2"></div>
                <button onclick="saveAndSend()" class="w-full bg-emerald-500 py-5 rounded-2xl font-black text-lg uppercase shadow-xl mt-4">Guardar y Enviar</button>
            </div>
            <div id="panel-hist" class="hidden space-y-3 p-2"></div>
            <div id="panel-clients" class="hidden space-y-4 p-2">
                <div class="bg-slate-800 p-4 rounded-xl">
                    <input type="text" id="c-new" placeholder="Nombre Cliente" class="input-dark mb-2">
                    <button onclick="saveClient()" class="w-full bg-blue-600 py-2 rounded-lg font-bold">REGISTRAR</button>
                </div>
                <div id="clients-list" class="space-y-2"></div>
            </div>
        </aside>

        <main id="preview-pane" class="lg:w-2/3 overflow-y-auto">
            <div id="pdf-canvas">
                <div style="display:flex; justify-content:space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 4px solid #0f172a; padding-bottom: 15px;">
                    <div><img src="logo.png" style="height:85px; width: auto;"></div>
                    <div style="text-align:right;">
                        <h2 id="p-folio" style="font-size:18px; font-weight:900; margin:0; color: #0f172a;">---</h2>
                        <p style="font-size:12px; margin:5px 0 0; color: #64748b; font-weight: 700;">FECHA: <span id="p-date" style="color:#0f172a"></span></p>
                    </div>
                </div>

                <div style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px;">
                    <p style="font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin:0 0 5px 0;">Presupuesto para:</p>
                    <b id="p-client" style="font-size: 18px; text-transform: uppercase; color: #0f172a;">---</b>
                </div>

                <table style="width:100%; border-collapse:collapse; table-layout: fixed;">
                    <thead>
                        <tr style="background: #0f172a; color: white;">
                            <th style="padding: 10px; text-align: center; font-size: 10px; width: 45px;">CANT</th>
                            <th style="padding: 10px; text-align: left; font-size: 10px;">DESCRIPCIÓN</th>
                            <th style="padding: 10px; text-align: center; font-size: 10px; width: 140px;">REF. VISUAL</th>
                            <th style="padding: 10px; text-align: right; font-size: 10px; width: 110px;">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top: 30px; display: flex; justify-content: flex-end;">
                    <div style="width: 280px; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px;">
                            <span>Neto:</span><b id="p-sub">$0</b>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 2px solid #cbd5e1;">
                            <span>IVA (19%):</span><b id="p-iva">$0</b>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 11px; font-weight: 900; color: #3b82f6;">TOTAL VENTA</span>
                            <h2 id="p-total" style="font-size: 34px; font-weight: 900; margin: 0; color: #0f172a;">$0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], tempImg = null, editingId = null, editingItemIdx = null;
        document.getElementById('q-date-input').valueAsDate = new Date();

        function setTab(t) {
            ['edit', 'hist', 'clients'].forEach(s => {
                document.getElementById('panel-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            document.getElementById('preview-pane').classList.toggle('hidden', t !== 'edit');
        }

        function handleImg(input) {
            if (!input.files[0]) return;
            const r = new FileReader();
            r.onload = e => { tempImg = e.target.result; document.getElementById('b-img').innerHTML = "✅"; };
            r.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const n = document.getElementById('i-name').value.toUpperCase(), p = Number(document.getElementById('i-price').value), q = Number(document.getElementById('i-qty').value);
            if(!n || p <= 0) return alert("Completa descripción y precio");
            if(editingItemIdx !== null) {
                items[editingItemIdx] = { name: n, price: p, qty: q, total: p*q, img: tempImg || items[editingItemIdx].img };
                cancelItemEdit();
            } else {
                items.push({ name: n, price: p, qty: q, total: p*q, img: tempImg });
            }
            resetItemForm(); renderPreview();
        }

        function resetItemForm() {
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = ""; document.getElementById('i-qty').value = "1";
            tempImg = null; document.getElementById('b-img').innerHTML = "📷";
        }

        function startItemEdit(idx) {
            editingItemIdx = idx; const it = items[idx];
            document.getElementById('i-name').value = it.name; document.getElementById('i-price').value = it.price; document.getElementById('i-qty').value = it.qty;
            document.getElementById('item-box').classList.replace('border-blue-600/20', 'border-orange-500');
            document.getElementById('item-mode-label').innerText = "Editando Ítem";
            document.getElementById('btn-item-main').innerText = "Actualizar";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
        }

        function cancelItemEdit() {
            editingItemIdx = null; resetItemForm();
            document.getElementById('item-box').classList.replace('border-orange-500', 'border-blue-600/20');
            document.getElementById('item-mode-label').innerText = "Nuevo Ítem";
            document.getElementById('btn-item-main').innerText = "Insertar";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        function renderPreview() {
            const dInput = document.getElementById('q-date-input').value;
            document.getElementById('p-date').innerText = dInput ? new Date(dInput+'T12:00:00').toLocaleDateString('es-CL') : '---';
            document.getElementById('p-client').innerText = document.getElementById('q-client').value || '---';
            const f = window.currentFolio || 1000, desc = document.getElementById('q-desc').value.toUpperCase() || 'COTIZACIÓN';
            document.getElementById('p-folio').innerText = `COT-${f} | ${desc}`;
            const b = document.getElementById('p-body');
            b.innerHTML = items.map(it => `
                <tr style="border-bottom: 1px solid #e2e8f0; vertical-align: middle;">
                    <td style="padding: 10px; text-align: center; font-weight: 800; font-size: 15px;">${it.qty}</td>
                    <td style="padding: 10px; font-size: 13px; line-height: 1.5; color: #1e293b; white-space: pre-wrap; word-wrap: break-word;">${it.name}</td>
                    <td style="padding: 10px; text-align: center;">
                        ${it.img ? `<img src="${it.img}" style="max-height: 40mm; max-width: 40mm; object-fit: contain;">` : ''}
                    </td>
                    <td style="padding: 10px; text-align: right; font-weight: 900; color: #0f172a; font-size: 15px;">$${it.total.toLocaleString('es-CL')}</td>
                </tr>`).join('');
            const n = items.reduce((s,i) => s + i.total, 0), v = Math.round(n * 0.19);
            document.getElementById('p-sub').innerText = `$${n.toLocaleString('es-CL')}`;
            document.getElementById('p-iva').innerText = `$${v.toLocaleString('es-CL')}`;
            document.getElementById('p-total').innerText = `$${(n + v).toLocaleString('es-CL')}`;
            document.getElementById('items-list').innerHTML = items.map((it, i) => `
                <div class="flex justify-between bg-slate-800 p-2 rounded border border-slate-700 items-center">
                    <span class="text-xs font-bold truncate w-2/3 uppercase">${it.name}</span>
                    <div class="flex gap-1"><button onclick="startItemEdit(${i})" class="text-blue-400 p-1 text-lg">✏️</button><button onclick="items.splice(${i},1);renderPreview();" class="text-red-500 p-1 text-lg">✕</button></div>
                </div>`).join('');
        }

        async function generatePDFLogic(f, c, itemsToPdf, dateToPdf) {
            const canvas = document.getElementById('pdf-canvas');
            const opt = { 
                margin: 0, 
                filename: `COT_${f}.pdf`, 
                image: { type: 'jpeg', quality: 1 }, 
                html2canvas: { scale: 3, useCORS: true, letterRendering: true, width: 794 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            const worker = html2pdf().from(canvas).set(opt);
            const blob = await worker.output('blob');
            const file = new File([blob], `COT_${f}.pdf`, { type: 'application/pdf' });
            if (navigator.share) await navigator.share({ files: [file], title: `COT_${f}` }).catch(() => worker.save());
            else worker.save();
        }

        async function saveAndSend() {
            const c = document.getElementById('q-client').value;
            if(!c || items.length === 0) return alert("Faltan datos");
            try {
                let f = window.currentFolio;
                if(!editingId) {
                    const cfgRef = fb.doc(fb.db, "config", "eureka_erp_v10");
                    const snap = await fb.getDoc(cfgRef);
                    f = snap.exists() ? snap.data().lastFolio : 1000;
                    await fb.updateDoc(cfgRef, { lastFolio: f + 1 });
                }
                const filename = `COT_${f}_${c}`;
                const data = { folio: f, folioCode: filename, client: c, items, date: document.getElementById('q-date-input').value, neto: items.reduce((s,i)=>s+i.total,0) };
                if(editingId) await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data);
                else await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
                
                await generatePDFLogic(f, c, items, document.getElementById('q-date-input').value);
                items = []; editingId = null; renderPreview();
            } catch (e) { alert(e.message); }
        }

        function updateUI() {
            const sel = document.getElementById('q-client'); sel.innerHTML = '<option value="">-- CLIENTE --</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `<div class="bg-slate-800 p-3 rounded flex justify-between border border-slate-700 items-center"><b>${c.name}</b><button onclick="fb.deleteDoc(fb.doc(fb.db,'erp_clientes','${c.id}'))" class="text-red-500">✕</button></div>`).join('');
        }

        async function saveClient() {
            const n = document.getElementById('c-new').value.toUpperCase();
            if(n) await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name: n });
            document.getElementById('c-new').value = "";
        }

        async function deleteHistory(id) {
            if(confirm('¿Eliminar permanente de la base de datos?')) {
                try {
                    await fb.deleteDoc(fb.doc(fb.db, "erp_cotizaciones", id));
                } catch(e) { alert("Error: " + e.message); }
            }
        }

        function renderHistory() {
            document.getElementById('panel-hist').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-4 rounded border-l-4 border-blue-500 mb-3 relative shadow-lg">
                    <p class="text-[9px] opacity-40 font-bold uppercase">${h.folioCode}</p>
                    <p class="font-black text-sm uppercase text-blue-100 mb-2">${h.client}</p>
                    <div class="flex justify-between items-center mt-4">
                        <b class="text-emerald-400 text-lg">$${Math.round(h.neto*1.19).toLocaleString()}</b>
                        <div class="flex gap-2">
                            <button onclick="loadEdit('${h.id}')" class="bg-blue-600 p-2 rounded text-xl">✏️</button>
                            <button onclick="deleteHistory('${h.id}')" class="bg-red-900/50 p-2 rounded text-xl">🗑️</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function loadEdit(id) {
            const h = window.historial.find(x => x.id === id);
            items = [...h.items]; editingId = id; window.currentFolio = h.folio;
            document.getElementById('q-client').value = h.client;
            document.getElementById('q-date-input').value = h.date;
            setTab('edit'); renderPreview();
        }
    </script>
</body>
</html>
