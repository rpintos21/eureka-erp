<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eureka! Lab ERP v30</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.currentFolio = (d.exists() && d.data().lastFolio) ? Number(d.data().lastFolio) : 1000;
            renderPreview();
        }, (err) => { window.currentFolio = 1000; });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateUI();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; font-size: 14px; }
        .tab-btn { padding: 16px; flex: 1; text-align: center; font-weight: 800; font-size: 10px; color: #64748b; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: #1e293b; }
        
        #pdf-canvas { 
            background: white; color: #1e293b; width: 210mm; min-height: 297mm; 
            padding: 20mm; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.35); transform-origin: top center;
        }
        @media (min-width: 1024px) { #pdf-canvas { transform: scale(0.75); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="flex bg-slate-900 border-b border-slate-800 shrink-0">
        <button onclick="setTab('edit')" id="tab-edit" class="tab-btn tab-active">Cotizador</button>
        <button onclick="setTab('hist')" id="tab-hist" class="tab-btn">Historial</button>
        <button onclick="setTab('clients')" id="tab-clients" class="tab-btn">Clientes</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        <aside class="lg:w-1/3 bg-slate-900 overflow-y-auto p-4 space-y-4 border-r border-slate-800">
            <div id="panel-edit" class="space-y-4">
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Receptor</p>
                    <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                    <input type="text" id="q-desc" placeholder="Asunto del Presupuesto" class="input-dark" oninput="renderPreview()">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="q-phone" placeholder="WhatsApp" class="input-dark" oninput="renderPreview()">
                        <input type="text" id="q-mail" placeholder="E-mail" class="input-dark" oninput="renderPreview()">
                    </div>
                    <input type="text" id="q-address" placeholder="Dirección" class="input-dark" oninput="renderPreview()">
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 space-y-3">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Nuevo Item</p>
                    <textarea id="i-name" placeholder="Descripción del producto..." class="input-dark h-24 resize-none"></textarea>
                    <div class="flex gap-2">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center w-20">
                        <input type="number" id="i-price" placeholder="$ Unitario" class="input-dark flex-1">
                        <button onclick="document.getElementById('f-img').click()" id="b-img" class="bg-slate-700 px-4 rounded-xl text-xl">📷</button>
                    </div>
                    <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                    <button onclick="addItem()" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase text-xs">Agregar Item</button>
                </div>

                <div id="items-list" class="space-y-2"></div>
                <button onclick="saveAndSend()" class="w-full bg-emerald-500 py-4 rounded-2xl font-black text-lg uppercase shadow-xl mt-4">Guardar y Enviar</button>
            </div>

            <div id="panel-hist" class="hidden space-y-3"></div>
            <div id="panel-clients" class="hidden space-y-4">
                <div class="flex gap-2"><input type="text" id="c-new" placeholder="Nombre Empresa" class="input-dark"><button onclick="addClient()" class="bg-blue-600 px-4 rounded-xl font-bold">+</button></div>
                <div id="clients-list" class="space-y-2"></div>
            </div>
        </aside>

        <main id="preview-pane" class="lg:w-2/3 bg-slate-850 overflow-y-auto p-4 flex justify-center">
            <div id="pdf-canvas">
                <div style="display:flex; justify-content:space-between; align-items: flex-start; margin-bottom: 30px;">
                    <div><img src="logo.png" style="height:80px; object-fit: contain;"></div>
                    <div style="text-align:right;">
                        <h2 id="p-folio" style="font-size:15px; font-weight:800; margin:0; color: #0f172a;">COT_EUREKALAB-1000</h2>
                        <p style="font-size:11px; margin:5px 0; color: #94a3b8; font-weight: 700;">FECHA: <span id="p-date" style="color:#0f172a"></span></p>
                    </div>
                </div>

                <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 40px; display: flex; justify-content: space-between;">
                    <div style="width: 60%;">
                        <p style="font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px;">Presupuesto para:</p>
                        <h3 id="p-client" style="font-size: 16px; font-weight: 800; margin: 0; color: #0f172a; text-transform: uppercase;">---</h3>
                        <p id="p-address-val" style="font-size: 11px; color: #64748b; margin: 5px 0 0;"></p>
                    </div>
                    <div style="width: 35%; text-align: right; border-left: 1px solid #e2e8f0; padding-left: 15px;">
                        <p style="font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px;">Contacto:</p>
                        <p id="p-phone-val" style="font-size: 11px; color: #1e293b; margin: 0; font-weight: 600;"></p>
                        <p id="p-mail-val" style="font-size: 11px; color: #1e293b; margin: 0; font-weight: 600;"></p>
                    </div>
                </div>

                <div id="p-body"></div>

                <div style="margin-top:50px; display: flex; justify-content: flex-end;">
                    <div style="width: 250px;">
                        <div style="display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f1f5f9;">
                            <span style="font-size: 11px; color: #94a3b8; font-weight: 700;">SUBTOTAL NETO</span>
                            <span id="p-sub" style="font-size: 13px; color: #0f172a; font-weight: 800;">$0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f1f5f9;">
                            <span style="font-size: 11px; color: #94a3b8; font-weight: 700;">IVA (19%)</span>
                            <span id="p-iva" style="font-size: 13px; color: #0f172a; font-weight: 800;">$0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 15px 0; align-items: center;">
                            <span style="font-size: 10px; color: #3b82f6; font-weight: 900;">TOTAL VENTA</span>
                            <h2 id="p-total" style="font-size:36px; font-weight:900; margin:0; color: #0f172a; letter-spacing: -1.5px;">$0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], tempImg = null, editingId = null;

        function setTab(t) {
            ['edit', 'hist', 'clients'].forEach(s => {
                document.getElementById('panel-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            document.getElementById('preview-pane').classList.toggle('hidden', t !== 'edit');
        }

        function handleImg(input) {
            const r = new FileReader();
            r.onload = e => { tempImg = e.target.result; document.getElementById('b-img').innerHTML = "✅"; };
            r.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const n = (document.getElementById('i-name').value || "S/D").toUpperCase();
            const p = Number(document.getElementById('i-price').value);
            const q = Number(document.getElementById('i-qty').value);
            if(p <= 0) return alert("Ingresa un precio");
            items.push({ name: n, price: p, qty: q, total: p * q, img: tempImg });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = "";
            tempImg = null; document.getElementById('b-img').innerHTML = "📷";
            renderPreview();
        }

        function renderPreview() {
            document.getElementById('p-date').innerText = new Date().toLocaleDateString('es-CL');
            document.getElementById('p-client').innerText = document.getElementById('q-client').value || '---';
            document.getElementById('p-phone-val').innerText = document.getElementById('q-phone').value || '';
            document.getElementById('p-mail-val').innerText = document.getElementById('q-mail').value || '';
            document.getElementById('p-address-val').innerText = document.getElementById('q-address').value || '';
            const desc = document.getElementById('q-desc').value || 'GENERAL';
            document.getElementById('p-folio').innerText = `COT_EUREKALAB-${window.currentFolio || 1000} - ${desc.toUpperCase()}`;

            const container = document.getElementById('p-body');
            container.innerHTML = items.map(it => `
                <div style="margin-bottom: 30px; border: 1px solid #f1f5f9; border-radius: 12px; overflow: hidden; page-break-inside: avoid;">
                    <div style="background: #f8fafc; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9;">
                        <span style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Detalle Ítem</span>
                        <div style="font-size: 12px; font-weight: 700; color: #0f172a;">${it.qty} x $${it.price.toLocaleString('es-CL')} | Neto: $${it.total.toLocaleString('es-CL')}</div>
                    </div>
                    <div style="padding: 20px; display: flex; flex-direction: column; align-items: center;">
                        ${it.img ? `<img src="${it.img}" style="max-width: 280px; max-height: 280px; object-fit: contain; margin-bottom: 20px; border-radius: 8px;">` : ''}
                        <div style="width: 100%; text-align: left;">
                            <p style="font-size: 13px; font-weight: 500; color: #1e293b; margin: 0; line-height: 1.6; white-space: pre-wrap; word-break: break-word;">${it.name}</p>
                        </div>
                    </div>
                </div>
            `).join('');

            const netVal = items.reduce((s,i) => s + i.total, 0);
            const ivaVal = Math.round(netVal * 0.19);
            document.getElementById('p-sub').innerText = `$${netVal.toLocaleString('es-CL')}`;
            document.getElementById('p-iva').innerText = `$${ivaVal.toLocaleString('es-CL')}`;
            document.getElementById('p-total').innerText = `$${(netVal + ivaVal).toLocaleString('es-CL')}`;
            
            document.getElementById('items-list').innerHTML = items.map((it, i) => `<div class="flex justify-between bg-slate-800 p-2 rounded-lg text-xs items-center"><span>${it.name.substring(0,30)}</span><button onclick="items.splice(${i},1);renderPreview();" class="text-red-400 font-bold px-2">✕</button></div>`).join('');
        }

        async function saveAndSend() {
            const client = document.getElementById('q-client').value;
            if(!client || items.length === 0) return alert("Falta cliente o productos");

            const safeFolio = window.currentFolio || 1000;
            const folioStr = `COT_EUREKALAB-${safeFolio} - ${document.getElementById('q-desc').value.toUpperCase()}`;
            
            const data = { 
                folio: safeFolio, 
                folioCode: folioStr, 
                client, 
                phone: document.getElementById('q-phone').value || "",
                mail: document.getElementById('q-mail').value || "",
                address: document.getElementById('q-address').value || "",
                desc: document.getElementById('q-desc').value || "S/D",
                items: items.map(it=>({...it, img: it.img?'IMG':null})), 
                neto: items.reduce((s,i)=>s+i.total,0),
                date: new Date().toLocaleDateString('es-CL') 
            };

            try {
                // PRIMERO GUARDAR EN BASE DE DATOS
                if(editingId) { await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data); } 
                else { 
                    await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data); 
                    await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) }); 
                }

                // LUEGO INTENTAR PDF
                const opt = { 
                    margin: 0, filename: folioStr+'.pdf', 
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, useCORS: true }, 
                    jsPDF: { unit: 'mm', format: 'a4' } 
                };
                
                const worker = html2pdf().from(document.getElementById('pdf-canvas')).set(opt);
                const blob = await worker.output('blob');
                const file = new File([blob], folioStr+'.pdf', { type: 'application/pdf' });

                if (navigator.share) {
                    await navigator.share({ files: [file], title: folioStr }).catch(() => worker.save());
                } else { worker.save(); }

                items = []; document.getElementById('q-desc').value = ""; renderPreview();
                alert("Guardado con éxito");
            } catch (e) { alert("Error: " + e.message); }
        }

        function updateUI() {
            const sel = document.getElementById('q-client'); sel.innerHTML = '<option value="">-- CLIENTE --</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `<div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center"><b class="text-sm uppercase italic">${c.name}</b><button onclick="fb.deleteDoc(fb.doc(fb.db,'erp_clientes','${c.id}'))" class="text-red-500 font-bold">✕</button></div>`).join('');
        }

        async function addClient() {
            const n = document.getElementById('c-new').value.toUpperCase();
            if(n) { await fb.addDoc(fb.collection(fb.db,"erp_clientes"), {name:n}); document.getElementById('c-new').value=""; }
        }

        function renderHistory() {
            document.getElementById('panel-hist').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-emerald-500 shadow-xl">
                    <p class="text-[9px] opacity-40 font-bold uppercase tracking-widest">${h.folioCode}</p>
                    <p class="font-bold text-sm uppercase italic">${h.client}</p>
                    <div class="flex justify-between mt-3 items-center">
                        <b class="text-emerald-400">$${Math.round(h.neto * 1.19).toLocaleString()}</b>
                        <button onclick="loadEdit('${h.id}')" class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase shadow-lg">Editar</button>
                    </div>
                </div>`).join('');
        }

        function loadEdit(id) {
            const h = window.historial.find(x => x.id === id); 
            items = [...h.items];
            document.getElementById('q-client').value = h.client; 
            document.getElementById('q-desc').value = h.desc || "";
            document.getElementById('q-phone').value = h.phone || "";
            document.getElementById('q-mail').value = h.mail || "";
            document.getElementById('q-address').value = h.address || "";
            editingId = id; setTab('edit'); renderPreview();
        }
    </script>
</body>
</html>
