<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eureka! ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <table style="width:100%; border-collapse:collapse;">
        <thead>
            <tr style="background:#0f172a; color:white; font-size:10px; text-transform:uppercase;">
                <th style="padding:12px 10px; width:50px;">Cant</th>
                <th style="padding:12px 10px; text-align:left;">Descripción</th>
                <th style="padding:12px 10px; width:80px; text-align:center;">P. Unit</th>
                <th style="padding:12px 10px; width:100px; text-align:center;">Imagen</th>
                <th style="padding:12px 10px; text-align:right; width:100px;">Total</th>
            </tr>
        </thead>
        <tbody id="p-body"></tbody>
    </table>

    <script>
        // 1. DENTRO DE TU FUNCIÓN renderPreview(), REEMPLAZA EL MAP POR ESTO:
        document.getElementById('p-body').innerHTML = items.map(it => `<tr>
            <td style="padding:15px 10px; text-align:center; font-weight:700;">${it.qty}</td>
            <td style="padding:15px 10px; font-size:13px;">${it.name}</td>
            <td style="padding:15px 10px; text-align:center;">${formatCLP(it.price)}</td>
            <td style="padding:15px 10px; text-align:center;">${it.img ? `<img src="${it.img}" style="max-height: 30mm; max-width: 35mm; object-fit: contain;">` : ''}</td>
            <td style="padding:15px 10px; text-align:right; font-weight:800;">${formatCLP(it.total)}</td>
        </tr>`).join('');

        // 2. DENTRO DE generateAndSharePDF, EN drawTableHeader():
        function drawTableHeader() {
            // ... (tu código original)
            pdf.text("CANT", m + 4, y + 6);
            pdf.text("DESCRIPCIÓN", m + 22, y + 6);
            pdf.text("P. UNIT", m + 105, y + 6); // Nueva columna
            pdf.text("IMAGEN", m + 125, y + 6);
            pdf.text("TOTAL", pageW - m - 3, y + 6, { align: 'right' });
            y += 9;
        }

        // 3. DENTRO DE generateAndSharePDF, EN drawItemRow(it):
        function drawItemRow(it) {
            // ... (donde tienes tus otros textos)
            pdf.text(money(it.price), m + 105, y + 8); // Coordenada para el precio
            // ... (resto de tu código original)
        }
    </script>
</body>
</html>
