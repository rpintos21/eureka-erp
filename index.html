<!-- ========================= -->
<!-- PREVIEW COTIZADOR -->
<!-- ========================= -->

<div class="preview-column">

    <div class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2 px-1">
        Desliza la hoja hacia la derecha →
    </div>

    <div class="viewer-container" id="main-viewer">

        <div class="viewer-inner">
            <div id="pdf-canvas" class="pdf-page"></div>
        </div>

    </div>

</div>


<!-- ========================= -->
<!-- VISOR HISTORIAL / LUPA -->
<!-- ========================= -->

<div class="text-slate-400 text-xs font-bold uppercase tracking-widest px-4 pt-3">
    Desliza la hoja hacia la derecha →
</div>

<div id="qv-body">

    <div class="viewer-inner">
        <div id="cloned-pdf-target" class="pdf-page"></div>
    </div>

</div>


<!-- ========================= -->
<!-- CSS -->
<!-- ========================= -->

<style>

:root {
    --a4-width: 210mm;
    --a4-height: 297mm;
}

/* ========================= */
/* CONTENEDOR PREVIEW */
/* ========================= */

.preview-column {
    width: 100%;
    min-width: 0;
    overflow: hidden;
}

/* ========================= */
/* SCROLL HORIZONTAL REAL */
/* ========================= */

.viewer-container {
    width: 100%;
    max-width: 100%;
    display: block;

    overflow-x: auto;
    overflow-y: auto;

    background: #020617;

    padding: 16px 0 60px 0;

    min-height: 50vh;

    -webkit-overflow-scrolling: touch;

    touch-action: pan-x pan-y;

    overscroll-behavior-x: contain;

    border-radius: 12px;
}

/* ========================= */
/* CONTENEDOR INTERNO */
/* ========================= */

.viewer-inner {
    width: 820px;
    min-width: 820px;
    max-width: 820px;

    padding-right: 26px;
}

/* ========================= */
/* HOJA A4 VISUAL */
/* ========================= */

.pdf-page {

    width: 794px;
    height: 1123px;

    min-width: 794px;
    min-height: 1123px;

    max-width: 794px;
    max-height: 1123px;

    padding: 45px;

    background: #ffffff !important;
    color: #1e293b !important;

    display: flex;
    flex-direction: column;

    position: relative;

    overflow: hidden;

    margin: 0;

    box-shadow: 0 10px 30px rgba(0,0,0,.50);
}

/* ========================= */
/* QUICK VIEW */
/* ========================= */

#qv-body {

    flex: 1;

    width: 100%;
    max-width: 100%;

    overflow-x: auto;
    overflow-y: auto;

    padding: 16px 0 60px 0;

    -webkit-overflow-scrolling: touch;

    touch-action: pan-x pan-y;

    overscroll-behavior-x: contain;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media screen and (max-width: 700px) {

    .preview-column {
        width: 100%;
        max-width: 100%;
        overflow: hidden;
    }

    .viewer-container {

        width: calc(100vw - 20px);
        max-width: calc(100vw - 20px);

        min-height: auto;

        border-radius: 12px;

        overflow-x: auto !important;
        overflow-y: auto;
    }

    .viewer-inner {

        width: 820px;
        min-width: 820px;
        max-width: 820px;
    }

    #qv-body {

        width: 100vw;
        max-width: 100vw;
    }
}

</style>
