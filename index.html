<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0,
                   maximum-scale=1.0,
                   user-scalable=no">

    <title>Eureka! ERP v82</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
          rel="stylesheet">


    <!-- ========================= -->
    <!-- FIREBASE -->
    <!-- ========================= -->

    <script type="module">

        import {
            initializeApp
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        import {
            getFirestore,
            doc,
            onSnapshot,
            updateDoc,
            increment,
            collection,
            addDoc,
            deleteDoc,
            setDoc,
            getDoc,
            runTransaction
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


        const firebaseConfig = {

            apiKey: "TU_API_KEY",

            authDomain: "TU_AUTH_DOMAIN",

            projectId: "TU_PROJECT_ID",

            storageBucket: "TU_STORAGE_BUCKET",

            messagingSenderId: "TU_SENDER_ID",

            appId: "TU_APP_ID"
        };


        const app = initializeApp(firebaseConfig);

        const db = getFirestore(app);


        window.fb = {

            db,
            doc,
            updateDoc,
            increment,
            collection,
            addDoc,
            deleteDoc,
            setDoc,
            getDoc,
            runTransaction
        };


        // =========================
        // CONFIG
        // =========================

        onSnapshot(

            doc(db, "config", "eureka_erp_v10"),

            (d) => {

                window.nextFolio = d.exists()
                    ? Number(d.data().lastFolio)
                    : 1000;

                renderPreview();
            }
        );


        // =========================
        // CLIENTES
        // =========================

        onSnapshot(

            collection(db, "erp_clientes"),

            (s) => {

                window.clientes = s.docs
                    .map(d => ({
                        id: d.id,
                        ...d.data()
                    }))
                    .sort((a, b) =>
                        a.name.localeCompare(b.name)
                    );

                updateUI();
            }
        );


        // =========================
        // HISTORIAL
        // =========================

        onSnapshot(

            collection(db, "erp_cotizaciones"),

            (s) => {

                window.historial = s.docs
                    .map(d => ({
                        id: d.id,
                        ...d.data()
                    }))
                    .sort((a, b) => b.folio - a.folio);

                renderHistory();
            }
        );

    </script>


    <!-- ========================= -->
    <!-- CSS -->
    <!-- ========================= -->

    <style>

        body {

            font-family: 'Inter', sans-serif;

            background: #020617;

            color: #f1f5f9;

            margin: 0;

            overflow-x: hidden;
        }


        .input-dark {

            background: #1e293b;

            border: 1px solid #334155;

            padding: 14px;

            border-radius: 12px;

            width: 100%;

            color: white;

            outline: none;

            font-size: 16px;

            box-sizing: border-box;
        }


        .tab-content {

            display: none;

            width: 100%;

            padding: 20px;

            box-sizing: border-box;
        }


        .tab-content.active {

            display: block;
        }


        .pdf-page {

            background: white !important;

            color: #1e293b !important;

            width: 210mm;

            min-height: 297mm;

            padding: 15mm;

            box-sizing: border-box;

            margin: 0 auto;

            display: flex;

            flex-direction: column;
        }


        #preliminar-container {

            width: 100%;

            overflow-x: auto;

            padding: 20px 0;

            background: #020617;

            display: flex;

            justify-content: center;
        }


        @media (max-width: 1024px) {

            #pdf-canvas {

                transform: scale(0.45);

                transform-origin: top center;

                margin-bottom: -160mm;
            }
        }


        @media (min-width: 1025px) {

            #pdf-canvas {

                transform: scale(1);

                transform-origin: top center;
            }
        }


        .icon-btn {

            width: 48px;

            height: 48px;

            display: flex;

            align-items: center;

            justify-content: center;

            border-radius: 12px;

            background: #1e293b;

            font-size: 20px;

            color: white;

            border: none;

            cursor: pointer;
        }

    </style>

</head>


<body>


<!-- ========================= -->
<!-- NAV -->
<!-- ========================= -->

<nav class="flex bg-slate-950 border-b border-slate-800 sticky top-0 z-[100]">

    <button onclick="navTo('edit')"
            id="m-edit"
            class="flex-1 p-4 font-black text-[11px] uppercase text-blue-500 border-b-2 border-blue-500">

        Cotizador

    </button>

    <button onclick="navTo('hist')"
            id="m-hist"
            class="flex-1 p-4 font-black text-[11px] uppercase text-slate-500 border-b-2 border-transparent">

        Historial

    </button>

    <button onclick="navTo('clients')"
            id="m-clients"
            class="flex-1 p-4 font-black text-[11px] uppercase text-slate-500 border-b-2 border-transparent">

        Clientes

    </button>

</nav>


<!-- ========================= -->
<!-- COTIZADOR -->
<!-- ========================= -->

<div id="sec-edit"
     class="tab-content active">

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">

        <!-- PANEL IZQUIERDO -->

        <div class="lg:w-[400px] space-y-4">

            <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 space-y-3">

                <input type="date"
                       id="q-date-input"
                       class="input-dark">

                <select id="q-client"
                        class="input-dark"
                        onchange="renderPreview()">

                </select>

                <input type="text"
                       id="q-desc"
                       placeholder="Referencia..."
                       class="input-dark"
                       oninput="renderPreview()">

            </div>


            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-4">

                <textarea id="i-name"
                          placeholder="Descripción..."
                          class="input-dark h-24 resize-none">

                </textarea>

                <div class="flex gap-3">

                    <input type="number"
                           id="i-qty"
                           value="1"
                           class="input-dark text-center w-20">

                    <input type="number"
                           id="i-price"
                           placeholder="$ Precio"
                           class="input-dark flex-1">

                </div>

                <button onclick="addItem()"
                        class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase">

                    Agregar Ítem

                </button>

            </div>


            <div id="items-list"
                 class="space-y-2">

            </div>


            <button onclick="saveAndSend()"
                    class="w-full bg-emerald-500 py-6 rounded-2xl font-black text-lg uppercase">

                Guardar y Descargar PDF

            </button>

        </div>


        <!-- PREVIEW -->

        <div id="preliminar-container">

            <div id="pdf-canvas"
                 class="pdf-page">

                <h1 style="font-size:32px;
                           font-weight:900;
                           margin-bottom:20px;">

                    COTIZACIÓN

                </h1>

                <div id="p-folio"
                     style="font-size:18px;
                            margin-bottom:10px;">

                </div>

                <div id="p-date"
                     style="margin-bottom:10px;">

                </div>

                <div id="p-client"
                     style="margin-bottom:30px;
                            font-size:18px;
                            font-weight:700;">

                </div>


                <table style="width:100%;
                              border-collapse:collapse;">

                    <thead>

                    <tr style="background:#0f172a;
                               color:white;">

                        <th style="padding:10px;">Cant</th>

                        <th style="padding:10px;">Descripción</th>

                        <th style="padding:10px;">Total</th>

                    </tr>

                    </thead>

                    <tbody id="p-body">

                    </tbody>

                </table>


                <div style="margin-top:auto;
                            padding-top:30px;">

                    <h2 id="p-total"
                        style="text-align:right;
                               font-size:32px;
                               font-weight:900;">

                    </h2>

                </div>

            </div>

        </div>

    </div>

</div>


<!-- ========================= -->
<!-- HISTORIAL -->
<!-- ========================= -->

<div id="sec-hist"
     class="tab-content">

    <input type="text"
           id="search-hist"
           placeholder="Buscar..."
           class="input-dark mb-6"
           oninput="renderHistory()">

    <div id="history-content"
         class="space-y-4 max-w-2xl mx-auto">

    </div>

</div>


<!-- ========================= -->
<!-- CLIENTES -->
<!-- ========================= -->

<div id="sec-clients"
     class="tab-content">

    <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-4 mb-8 max-w-md mx-auto">

        <input type="text"
               id="c-name"
               placeholder="Nombre Empresa"
               class="input-dark">

        <button onclick="saveClient()"
                class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase">

            Guardar Cliente

        </button>

    </div>


    <div id="clients-list"
         class="space-y-4 max-w-md mx-auto">

    </div>

</div>


<!-- ========================= -->
<!-- JAVASCRIPT -->
<!-- ========================= -->

<script>

let items = [];

let editingId = null;


document.getElementById('q-date-input').valueAsDate = new Date();


// =========================
// NAVEGACIÓN
// =========================

function navTo(sec) {

    ['edit','hist','clients'].forEach(s => {

        document
            .getElementById('sec-'+s)
            .classList
            .toggle('active', s === sec);

    });
}


// =========================
// AGREGAR ITEM
// =========================

function addItem() {

    const n =
        document
        .getElementById('i-name')
        .value
        .trim();

    const q =
        Number(document.getElementById('i-qty').value);

    const p =
        Number(document.getElementById('i-price').value);

    if(!n || p <= 0) {

        alert("Completa los datos");

        return;
    }

    items.push({

        name: n.toUpperCase(),

        qty: q,

        price: p,

        total: q * p
    });

    renderPreview();
}


// =========================
// PREVIEW
// =========================

function renderPreview() {

    const d =
        document.getElementById('q-date-input').value;

    document.getElementById('p-date').innerText =
        d;

    const c =
        document.getElementById('q-client').value;

    document.getElementById('p-client').innerText =
        c || "---";

    const f =
        editingId
            ? window.currentFolio
            : (window.nextFolio || 1000);

    document.getElementById('p-folio').innerText =
        `COT-${f}`;

    document.getElementById('p-body').innerHTML =
        items.map(it => `

            <tr>

                <td style="padding:12px;
                           text-align:center;">

                    ${it.qty}

                </td>

                <td style="padding:12px;">

                    ${it.name}

                </td>

                <td style="padding:12px;
                           text-align:right;">

                    $${it.total.toLocaleString('es-CL')}

                </td>

            </tr>

        `).join('');

    const total =
        items.reduce((s,i) => s+i.total,0);

    document.getElementById('p-total').innerText =
        `$${total.toLocaleString('es-CL')}`;
}


// =========================
// PDF CENTRADO
// =========================

async function generateAndSharePDF(folio, mode) {

    const original =
        document.getElementById('pdf-canvas');

    const tempWrapper =
        document.createElement('div');

    tempWrapper.style.position = 'fixed';

    tempWrapper.style.left = '-99999px';

    tempWrapper.style.top = '0';

    tempWrapper.style.width = '210mm';

    tempWrapper.style.background = 'white';

    const clone =
        original.cloneNode(true);

    clone.style.transform = 'none';

    clone.style.width = '210mm';

    clone.style.minHeight = '297mm';

    clone.style.background = 'white';

    tempWrapper.appendChild(clone);

    document.body.appendChild(tempWrapper);

    const opt = {

        margin: 0,

        filename: `COT_${folio}.pdf`,

        image: {

            type: 'jpeg',

            quality: 1
        },

        html2canvas: {

            scale: 3,

            useCORS: true,

            backgroundColor: '#ffffff'
        },

        jsPDF: {

            unit: 'mm',

            format: 'a4',

            orientation: 'portrait'
        }
    };

    try {

        const worker =
            html2pdf()
            .from(clone)
            .set(opt);

        if(mode === 'share' && navigator.share) {

            const pdfBlob =
                await worker.output('blob');

            const file =
                new File(

                    [pdfBlob],

                    `COT_${folio}.pdf`,

                    {
                        type:'application/pdf'
                    }
                );

            await navigator.share({

                files:[file],

                title:`Cotización #${folio}`
            });

        } else {

            await worker.save();
        }

    } catch(err) {

        console.error(err);

        alert("Error generando PDF");

    } finally {

        document.body.removeChild(tempWrapper);
    }
}


// =========================
// GUARDAR
// =========================

async function saveAndSend() {

    const client =
        document.getElementById('q-client').value;

    if(!client || items.length === 0) {

        alert("Faltan datos");

        return;
    }

    let folio =
        editingId
            ? window.currentFolio
            : window.nextFolio;

    await generateAndSharePDF(folio, 'save');
}


// =========================
// CLIENTES
// =========================

async function saveClient() {

    const data = {

        name:
            document
            .getElementById('c-name')
            .value
            .toUpperCase()
    };

    if(!data.name) return;

    await fb.addDoc(

        fb.collection(
            fb.db,
            "erp_clientes"
        ),

        data
    );

    document.getElementById('c-name').value = "";

    navTo('edit');
}


// =========================
// UI CLIENTES
// =========================

function updateUI() {

    const sel =
        document.getElementById('q-client');

    sel.innerHTML =
        '<option value="">-- CLIENTE --</option>';

    (window.clientes || []).forEach(c => {

        sel.innerHTML += `

            <option value="${c.name}">

                ${c.name}

            </option>
        `;
    });
}


// =========================
// HISTORIAL
// =========================

function renderHistory() {

    const data =
        window.historial || [];

    document.getElementById('history-content')
        .innerHTML = data.map(h => `

            <div class="bg-slate-800 p-5 rounded-2xl flex justify-between">

                <div>

                    <b>${h.client}</b>

                    <br>

                    #${h.folio}

                </div>

            </div>

        `).join('');
}

</script>

</body>
</html>
