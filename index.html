    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {
            getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc, runTransaction
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc, runTransaction };

        window.addEventListener("DOMContentLoaded", () => {
            onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
                window.nextFolio = d.exists() ? Number(d.data().lastFolio) : 1000;
                if (window.renderPreview) window.renderPreview();
            });

            onSnapshot(collection(db, "erp_clientes"), (s) => {
                window.clientes = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")));
                if (window.updateUI) window.updateUI();
                if (window.renderPreview) window.renderPreview();
            });

            onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
                window.historial = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => Number(b.folio || 0) - Number(a.folio || 0));
                if (window.renderHistory) window.renderHistory();
            });
        });
    </script>

        .tab-content { display: none; width: 100%; padding: 20px; }
        .tab-content.active { display: block; }

        /* Estilos de la Hoja PDF */
        .pdf-page {

        .ci-line { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #0f172a; }

        .ci-icon {

        }

        .items-table td { border-bottom: 1px solid #e2e8f0; padding: 12px 10px; font-size: 11px; }

        .payment-box { background: #f0f9ff; border: 1px solid #bae6fd; padding: 15px; border-radius: 12px; font-size: 11px; color: #0c4a6e; width: 400px; }
        
        @media screen and (max-width: 700px) {
            .pdf-page { width: 95vw; min-width: 95vw; padding: 20px; min-height: auto; transform: scale(1); }
