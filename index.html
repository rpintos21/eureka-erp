<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka! Lab ERP v16</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.lastFolio = d.exists() ? d.data().lastFolio : 1000;
            renderPreview();
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            const sel = document.getElementById('q-client');
            sel.innerHTML = '<option value="">Seleccionar Cliente</option><option value="NEW">+ Nuevo Cliente</option>';
            s.docs.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .canvas-pdf { background: white; color: #334; width: 210mm; min-height: 297mm; padding: 15mm; margin: 20px auto; box-shadow: 0 0 40px rgba(0,0,0,0.5); transform: scale(0.38); transform-origin: top center; }
        @media (min-width: 1024px) { .canvas-pdf { transform: scale(0.75); } }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; font-weight: bold; font-size: 14px; }
        .tab-btn { flex: 1; padding: 15px; font-weight: 900; font-size: 11px; color: #64748b; }
        .tab-active { color: #3b82f6; border-bottom: 3px solid #3b82f6; }
    </style>
</head>
<body>

    <div class="flex flex-col lg:flex-row h-screen">
        <aside class="lg:w-1/3 bg-slate-900 border-r border-slate-800 flex flex-col z-20">
            <nav class="flex bg-slate-950">
                <button onclick="setTab('edit')" id="t-edit" class="tab-btn tab-active uppercase">Editor</button>
                <button onclick="setTab('hist')" id="t-hist" class="tab-btn uppercase">Historial</button>
            </nav>

            <div id="p-edit" class="p-5 overflow-y-auto flex-1 space-y-4">
                <img src="logo.png" class="h-14 mx-auto" alt="Logo">
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Cliente</label>
                    <select id="q-client" class="input-dark" onchange="if(this.value==='NEW') addClient(); renderPreview();"></select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Descripción del Folio</label>
                    <input type="text" id="q-desc" placeholder="Ej: Letrero Neón Pub" class="input-dark" oninput="renderPreview()">
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl space-y-3 border border-slate-700 shadow-inner">
                    <input type="text" id="i-name" placeholder="Producto/Servicio" class="input-dark">
                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center">
                        <input type="number" id="i-price" placeholder="$ Precio" class="input-dark">
                        <button onclick="document.getElementById('f-img').click()" id="b-img" class="bg-slate-700 rounded-xl text-xl">📷</button>
                    </div>
                    <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                    <button onclick="addItem()" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-xs">+ Añadir Item</button>
                </div>

                <div id="items-list" class="space-y-2"></div>
                
                <div class="pt-2 space-y-2">
                    <button onclick="saveAndPDF()" class="w-full bg-emerald-500 py-5 rounded-2xl font-black text-sm uppercase shadow-xl">Guardar y Compartir PDF</button>
                    <p class="text-[9px] text-center text-slate-500 font-bold uppercase italic">Se abrirá el menú de envío (WhatsApp/Mail) automáticamente</p>
                </div>
            </div>

            <div id="p-hist" class="p-5 overflow-y-auto flex-1 hidden space-y-3"></div>
        </aside>

        <main class="lg:w-2/3 bg-slate-950 overflow-y-auto p-4">
            <div id="pdf-area" class="canvas-pdf">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:6px solid #0f172a; padding-bottom:20px; margin-bottom:30px">
                    <div style="width:60%">
                        <img src="logo.png" style="height:90px; margin-bottom:10px">
                        <h1 style="font-size:32px; margin:0; font-weight:900; color:#0f172a">EUREKA! LAB</h1>
                        <p style="font-size:11px; margin:0; font-weight:bold; color:#64748b; text-transform:uppercase; letter-spacing:2px">Diseño y Producción Industrial</p>
                    </div>
                    <div style="width:38%; text-align:right">
                        <div style="background:#0f172a; color:white; padding:12px; border-radius:0 0 0 30px; margin-bottom:10px">
                            <p style="font-size:8px; margin:0; font-weight:bold; opacity:0.7">COTIZACIÓN CORRELATIVA</p>
                            <h2 id="p-folio" style="margin:0; font-size:12px; font-weight:900">COT_EUREKALAB-1000</h2>
                        </div>
                        <p style="font-size:12px; margin:2px 0"><b>Fecha:</b> <span id="p-date"></span></p>
                        <p style="font-size:12px; margin:2px 0"><b>Cliente:</b> <span id="p-client" style="font-weight:900">---</span></p>
                    </div>
                </div>

                <table style="width:100%; border-collapse:collapse">
                    <thead>
                        <tr style="background:#f1f5f9; text-transform:uppercase; font-size:9px; font-weight:900">
                            <th style="padding:12px; text-align:left; width:70px">Img</th>
                            <th style="padding:12px; text-align:left">Descripción</th>
                            <th style="padding:12px; text-align:center">Cant</th>
                            <th style="padding:12px; text-align:right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top:40px; border-top:2px solid #f1f5f9; padding-top:20px; text-align:right">
                    <p style="font-size:10px; font-weight:900; color:#64748b; margin:0 uppercase">Total Neto Cotizado</p>
                    <h2 id="p-total" style="font-size:40px; margin:0; font-weight:900; color:#0f172a">$0</h2>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], tempImg = null;

        function setTab(t) {
            document.getElementById('p-edit').classList.toggle('hidden', t!=='edit');
            document.getElementById('p-hist').classList.toggle('hidden', t!=='hist');
            document.getElementById('t-edit').classList.toggle('tab-active', t==='edit');
            document.getElementById('t-hist').classList.toggle('tab-active', t==='hist');
        }

        async function addClient() {
            const n = prompt("Nombre nuevo cliente:");
            if(n) await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name: n.toUpperCase() });
        }

        function handleImg(input) {
            const reader = new FileReader();
            reader.onload = e => { tempImg = e.target.result; document.getElementById('b-img').innerHTML = "✅"; };
            reader.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const name = document.getElementById('i-name').value.toUpperCase();
            const price = Number(document.getElementById('i-price').value);
            const qty = Number(document.getElementById('i-qty').value);
            if(!name || price <= 0) return alert("Faltan datos");
            items.push({ name, price, qty, total: price * qty, img: tempImg });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = "";
            tempImg = null; document.getElementById('btn-img' || 'b-img').innerHTML = "📷";
            renderPreview();
        }

        function renderPreview() {
            document.getElementById('p-date').innerText = new Date().toLocaleDateString('es-CL');
            document.getElementById('p-client').innerText = document.getElementById('q-client').value || '---';
            const desc = document.getElementById('q-desc').value || 'S/D';
            const fullFolio = `COT_EUREKALAB-${window.lastFolio || 1000} - ${desc.toUpperCase()}`;
            document.getElementById('p-folio').innerText = fullFolio;

            const tbody = document.getElementById('p-body');
            tbody.innerHTML = "";
            let total = 0;
            items.forEach((it, i) => {
                total += it.total;
                tbody.innerHTML += `
                    <tr style="border-bottom:1px solid #f1f5f9">
                        <td style="padding:10px"><img src="${it.img || ''}" style="width:45px; height:45px; object-fit:cover; border-radius:6px" onerror="this.style.display='none'"></td>
                        <td style="padding:10px; font-size:12px"><b>${it.name}</b><br><small style="color:#64748b">$${it.price.toLocaleString()}</small></td>
                        <td style="padding:10px; text-align:center; font-weight:bold">${it.qty}</td>
                        <td style="padding:10px; text-align:right; font-weight:900">$${it.total.toLocaleString()}</td>
                    </tr>`;
            });
            document.getElementById('p-total').innerText = `$${total.toLocaleString()}`;
            
            document.getElementById('items-list').innerHTML = items.map((it, i) => `
                <div class="flex justify-between bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                    <span class="font-bold">${it.name}</span>
                    <button onclick="items.splice(${i},1); renderPreview();" class="text-red-400 font-bold px-2">✕</button>
                </div>`).join('');
        }

        async function saveAndPDF() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc').value;
            if(!client || !desc || items.length === 0) return alert("Completa todos los campos");

            const folioStr = `COT_EUREKALAB-${window.lastFolio} - ${desc.toUpperCase()}`;
            
            if(confirm(`¿Guardar y enviar ${folioStr}?`)) {
                await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), {
                    folio: window.lastFolio, folioCode: folioStr, client, desc,
                    items: items.map(i => ({...i})),
                    total: items.reduce((s,i) => s+i.total, 0),
                    date: new Date().toLocaleDateString('es-CL')
                });

                await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) });

                const element = document.getElementById('pdf-area');
                const opt = { margin: 0, filename: folioStr+'.pdf', html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                
                const worker = html2pdf().from(element).set(opt);
                
                // Intentar compartir (Nativo en Móvil)
                worker.output('blob').then(blob => {
                    const file = new File([blob], folioStr+'.pdf', { type: 'application/pdf' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: 'Cotización ' + folioStr,
                            text: 'Envío de cotización Eureka! Lab'
                        }).catch(() => worker.save());
                    } else {
                        worker.save();
                    }
                });

                items = []; document.getElementById('q-desc').value = ""; renderPreview();
            }
        }

        function renderHistory() {
            document.getElementById('p-hist').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-4 rounded-2xl border-l-8 border-blue-500 shadow-lg">
                    <p class="text-[9px] font-black text-slate-500 mb-1">${h.folioCode}</p>
                    <p class="font-bold text-sm uppercase">${h.client}</p>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-emerald-400 font-black">$${h.total.toLocaleString()}</span>
                        <button onclick="loadToEdit('${h.id}')" class="bg-blue-600 text-[9px] px-3 py-2 rounded-lg font-black uppercase">Cargar e Iterar</button>
                    </div>
                </div>`).join('');
        }

        function loadToEdit(id) {
            const h = window.historial.find(x => x.id === id);
            if(h) {
                items = [...h.items];
                document.getElementById('q-client').value = h.client;
                document.getElementById('q-desc').value = h.desc || "";
                renderPreview(); setTab('edit');
            }
        }
    </script>
</body>
</html>
