<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka! Lab ERP v20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.lastFolio = d.exists() ? d.data().lastFolio : 1000;
            renderPreview();
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateUI();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; }
        .editor-panel { background: #1e293b; border-right: 1px solid #334155; }
        .input-box { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 12px; width: 100%; color: white; transition: 0.2s; }
        .input-box:focus { border-color: #3b82f6; outline: none; }
        .preview-area { background: #334155; display: flex; justify-content: center; padding: 40px; overflow-y: auto; }
        
        /* HOJA PDF */
        #pdf-content { 
            background: white; color: #1e293b; width: 210mm; min-height: 297mm; 
            padding: 25mm; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            transform: scale(0.4); transform-origin: top center;
        }
        @media (min-width: 1024px) { #pdf-content { transform: scale(0.7); } }
        @media (min-width: 1400px) { #pdf-content { transform: scale(0.9); } }
        
        .tab-nav { border-bottom: 1px solid #334155; background: #1e293b; }
        .tab-link { padding: 16px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; border-bottom: 2px solid transparent; }
        .tab-link.active { color: #3b82f6; border-bottom-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="flex tab-nav">
        <button onclick="setTab('edit')" id="tab-edit" class="tab-link active">Editor</button>
        <button onclick="setTab('hist')" id="tab-hist" class="tab-link">Historial</button>
        <button onclick="setTab('clients')" id="tab-clients" class="tab-link">Clientes</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        <aside class="lg:w-1/3 editor-panel overflow-y-auto p-6 space-y-6">
            
            <div id="panel-edit" class="space-y-6">
                <section class="space-y-3">
                    <select id="q-client" class="input-box" onchange="renderPreview()"></select>
                    <input type="text" id="q-desc" placeholder="Descripción del trabajo..." class="input-box" oninput="renderPreview()">
                </section>

                <section class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 space-y-4">
                    <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Nuevo Item</h3>
                    <input type="text" id="i-name" placeholder="Nombre del producto..." class="input-box">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="i-qty" value="1" class="input-box text-center">
                        <input type="number" id="i-price" placeholder="Precio $" class="input-box">
                    </div>
                    <button onclick="addItem()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold uppercase text-xs tracking-tighter transition">Añadir a la hoja</button>
                </section>

                <div id="items-list" class="space-y-2"></div>

                <button onclick="processFinal()" class="w-full bg-emerald-500 hover:bg-emerald-400 py-5 rounded-2xl font-black uppercase text-sm tracking-widest shadow-2xl transition">Guardar y Compartir</button>
            </div>

            <div id="panel-hist" class="hidden space-y-4"></div>
            <div id="panel-clients" class="hidden space-y-4">
                <input type="text" id="c-new" placeholder="Nombre nuevo cliente..." class="input-box">
                <button onclick="addClient()" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase text-xs">Registrar</button>
                <div id="clients-list" class="space-y-2 mt-4"></div>
            </div>
        </aside>

        <main id="preview-panel" class="lg:w-2/3 preview-area">
            <div id="pdf-content">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 8px solid #0f172a; padding-bottom: 30px; margin-bottom: 40px;">
                    <div>
                        <img src="logo.png" style="height: 100px; width: auto; display: block; margin-bottom: 10px;">
                        <p style="font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 3px; margin: 0;">Diseño & Producción Industrial</p>
                    </div>
                    <div style="text-align: right;">
                        <div style="background: #0f172a; color: white; padding: 20px; border-radius: 0 0 0 40px; min-width: 250px;">
                            <p style="font-size: 10px; font-weight: 800; opacity: 0.6; margin: 0; text-transform: uppercase;">Folio Cotización</p>
                            <h2 id="p-folio" style="margin: 5px 0 0; font-size: 16px; font-weight: 800; letter-spacing: -0.5px;">COT_EUREKALAB-1000</h2>
                        </div>
                        <p style="margin: 20px 0 5px; font-size: 14px; color: #64748b;"><b>Fecha:</b> <span id="p-date" style="color:#1e293b"></span></p>
                        <p style="margin: 0; font-size: 14px; color: #64748b;"><b>Cliente:</b> <span id="p-client" style="color:#1e293b; font-weight: 800; text-transform: uppercase;"></span></p>
                    </div>
                </div>

                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                            <th style="padding: 15px; text-align: left; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b;">Descripción del Servicio</th>
                            <th style="padding: 15px; text-align: center; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; width: 80px;">Cant.</th>
                            <th style="padding: 15px; text-align: right; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; width: 150px;">Total Neto</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top: 50px; border-top: 2px solid #f1f5f9; padding-top: 30px; text-align: right;">
                    <p style="font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin: 0;">Total Inversión</p>
                    <h2 id="p-total" style="font-size: 54px; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -2px;">$0</h2>
                </div>

                <div style="margin-top: 100px; border-top: 1px solid #e2e8f0; pt-20; font-size: 10px; color: #94a3b8; text-align: center; font-style: italic;">
                    Documento generado por Eureka! Lab Management System. Validez de cotización: 15 días.
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], editingId = null;

        function setTab(t) {
            ['edit', 'hist', 'clients'].forEach(s => {
                document.getElementById('panel-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            document.getElementById('preview-panel').classList.toggle('hidden', t !== 'edit');
        }

        function addItem() {
            const name = document.getElementById('i-name').value.toUpperCase();
            const price = Number(document.getElementById('i-price').value);
            const qty = Number(document.getElementById('i-qty').value);
            if(!name || price <= 0) return alert("Faltan datos");
            items.push({ name, price, qty, total: price * qty });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = "";
            renderPreview();
        }

        function renderPreview() {
            const client = document.getElementById('q-client').value || '---';
            const desc = document.getElementById('q-desc').value || '---';
            const folio = `COT_EUREKALAB-${window.lastFolio || 1000} - ${desc.toUpperCase()}`;
            
            document.getElementById('p-date').innerText = new Date().toLocaleDateString('es-CL');
            document.getElementById('p-client').innerText = client;
            document.getElementById('p-folio').innerText = folio;

            const tbody = document.getElementById('p-body');
            tbody.innerHTML = items.map(it => `
                <tr style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 20px 15px; font-size: 14px; font-weight: 600;">${it.name}</td>
                    <td style="padding: 20px 15px; text-align: center; font-weight: 600;">${it.qty}</td>
                    <td style="padding: 20px 15px; text-align: right; font-weight: 800; font-size: 16px;">$${it.total.toLocaleString('es-CL')}</td>
                </tr>
            `).join('');

            const total = items.reduce((s,i) => s + i.total, 0);
            document.getElementById('p-total').innerText = `$${total.toLocaleString('es-CL')}`;
            
            document.getElementById('items-list').innerHTML = items.map((it, i) => `
                <div class="flex justify-between bg-slate-800 p-3 rounded-xl border border-slate-700 text-xs">
                    <span class="font-bold">${it.name}</span>
                    <button onclick="items.splice(${i},1); renderPreview();" class="text-red-400 font-bold px-2">✕</button>
                </div>`).join('');
        }

        async function processFinal() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc').value;
            if(!client || items.length === 0) return alert("Datos incompletos");

            const folioStr = `COT_EUREKALAB-${window.lastFolio} - ${desc.toUpperCase()}`;
            const data = { 
                folio: window.lastFolio, folioCode: folioStr, client, desc, items, 
                total: items.reduce((s,i)=>s+i.total,0), 
                date: new Date().toLocaleDateString('es-CL') 
            };

            if(editingId) {
                await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data);
                editingId = null;
            } else {
                await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
                await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) });
            }

            const opt = { 
                margin: 0, filename: folioStr+'.pdf', 
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            
            const worker = html2pdf().from(document.getElementById('pdf-content')).set(opt);
            const blob = await worker.output('blob');
            const file = new File([blob], folioStr+'.pdf', { type: 'application/pdf' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: folioStr });
            } else {
                worker.save();
            }

            items = []; document.getElementById('q-desc').value = ""; renderPreview();
            alert("Listo.");
        }

        function updateUI() {
            const sel = document.getElementById('q-client');
            const curr = sel.value;
            sel.innerHTML = '<option value="">Seleccionar Cliente</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            sel.value = curr;

            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `
                <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center border border-slate-700">
                    <span class="font-bold text-sm uppercase">${c.name}</span>
                    <button onclick="fb.deleteDoc(fb.doc(fb.db, 'erp_clientes', '${c.id}'))" class="text-red-500 text-xs font-black">ELIMINAR</button>
                </div>`).join('');
        }

        async function addClient() {
            const n = document.getElementById('c-new').value.toUpperCase();
            if(n) {
                await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name: n });
                document.getElementById('c-new').value = "";
            }
        }

        function renderHistory() {
            document.getElementById('panel-hist').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-4 rounded-2xl border-l-8 border-blue-600 shadow-xl">
                    <p class="text-[9px] font-black opacity-40 uppercase tracking-tighter">${h.folioCode}</p>
                    <p class="font-black text-sm uppercase italic">${h.client}</p>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-emerald-400 font-black tracking-widest">$${h.total.toLocaleString('es-CL')}</span>
                        <div class="flex gap-2">
                            <button onclick="loadEdit('${h.id}')" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-black uppercase">Editar</button>
                            <button onclick="fb.deleteDoc(fb.doc(fb.db, 'erp_cotizaciones', '${h.id}'))" class="bg-red-900/50 text-red-400 px-3 py-1 rounded text-[10px] font-black uppercase">Borrar</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function loadEdit(id) {
            const h = window.historial.find(x => x.id === id);
            items = [...h.items];
            document.getElementById('q-client').value = h.client;
            document.getElementById('q-desc').value = h.desc || "";
            editingId = id;
            setTab('edit');
            renderPreview();
        }
    </script>
</body>
</html>
