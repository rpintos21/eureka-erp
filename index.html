<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka! ERP v19 - Final Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.lastFolio = d.exists() ? d.data().lastFolio : 1000;
            renderPreview();
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateClientSelectors();
            renderClientManager();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; font-size: 14px; }
        .btn-tab { flex: 1; padding: 15px; font-size: 11px; font-weight: 800; color: #64748b; border-bottom: 2px solid transparent; }
        .btn-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; background: #0f172a; }
        .paper-container { background: #334; padding: 20px; display: flex; justify-content: center; overflow-y: auto; }
        /* El PDF se escala para vista previa */
        #pdf-area { background: white; color: #1e293b; width: 210mm; min-height: 297mm; padding: 20mm; box-shadow: 0 0 30px rgba(0,0,0,0.5); transform: scale(0.4); transform-origin: top center; }
        @media (min-width: 1024px) { #pdf-area { transform: scale(0.75); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="flex bg-slate-950 border-b border-slate-800">
        <button onclick="switchTab('editor')" id="tab-editor" class="btn-tab active uppercase">Editor</button>
        <button onclick="switchTab('historial')" id="tab-historial" class="btn-tab uppercase">Historial</button>
        <button onclick="switchTab('clientes')" id="tab-clientes" class="btn-tab uppercase">Clientes</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <aside id="panel-controls" class="lg:w-1/3 bg-slate-900 border-r border-slate-800 overflow-y-auto p-6 space-y-5">
            
            <div id="sec-editor" class="space-y-4">
                <div class="space-y-3">
                    <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                    <input type="text" id="q-desc" placeholder="Descripción del Folio (ej: Letrero)" class="input-dark" oninput="renderPreview()">
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl space-y-3 border border-slate-700">
                    <input type="text" id="i-name" placeholder="Nombre del Producto..." class="input-dark">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center">
                        <input type="number" id="i-price" placeholder="Precio $" class="input-dark">
                    </div>
                    <button onclick="addItem()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">+ Añadir Item</button>
                </div>

                <div id="items-list" class="space-y-2"></div>
                
                <button onclick="saveAndProcess()" class="w-full bg-emerald-500 hover:bg-emerald-400 py-5 rounded-2xl font-black uppercase text-sm shadow-xl transition-all">Guardar y Compartir PDF</button>
            </div>

            <div id="sec-historial" class="hidden space-y-3"></div>

            <div id="sec-clientes" class="hidden space-y-4">
                <div class="bg-slate-800 p-4 rounded-2xl space-y-3 border border-slate-700">
                    <input type="text" id="c-name" placeholder="Nombre del Cliente" class="input-dark">
                    <button onclick="saveClient()" id="btn-client-action" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase text-[10px]">Registrar Cliente</button>
                </div>
                <div id="clients-list" class="space-y-2"></div>
            </div>
        </aside>

        <main id="panel-preview" class="lg:w-2/3 paper-container">
            <div id="pdf-area">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:6px solid #0f172a; padding-bottom:20px; margin-bottom:30px">
                    <div style="width:55%">
                        <img src="logo.png" style="height:100px; display:block; margin-bottom:10px" alt="Logo">
                        <h1 style="font-size:30px; margin:0; font-weight:900; letter-spacing:-1px; color:#0f172a">EUREKA! LAB</h1>
                        <p style="font-size:11px; color:#64748b; margin:0; font-weight:bold; text-transform:uppercase; letter-spacing:2px">Diseño y Producción Industrial</p>
                    </div>
                    <div style="width:40%; text-align:right">
                        <div style="background:#0f172a; color:white; padding:15px; border-radius:0 0 0 30px">
                            <p style="font-size:9px; margin:0; font-weight:bold; opacity:0.7">COTIZACIÓN CORRELATIVA</p>
                            <h2 id="p-folio" style="margin:0; font-size:13px; font-weight:900">COT_EUREKALAB-1000</h2>
                        </div>
                        <p style="font-size:13px; margin-top:15px; margin-bottom:5px"><b>Fecha:</b> <span id="p-date"></span></p>
                        <p style="font-size:13px; margin:0"><b>Cliente:</b> <span id="p-client" style="font-weight:900">---</span></p>
                    </div>
                </div>

                <table style="width:100%; border-collapse:collapse">
                    <thead style="background:#f1f5f9; font-size:10px; text-transform:uppercase">
                        <tr>
                            <th style="padding:15px; text-align:left">Descripción del Servicio / Producto</th>
                            <th style="padding:15px; text-align:center; width:80px">Cant</th>
                            <th style="padding:15px; text-align:right; width:120px">Total</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top:50px; border-top:2px solid #f1f5f9; padding-top:25px; text-align:right">
                    <p style="font-size:12px; font-weight:900; color:#64748b; margin:0; text-transform:uppercase">Total Inversión Neto</p>
                    <h2 id="p-total" style="font-size:45px; margin:0; font-weight:900; color:#0f172a">$0</h2>
                </div>
            </div>
        </main>

    </div>

    <script>
        let items = [], editingCotId = null, editingClientId = null;

        function switchTab(t) {
            ['editor', 'historial', 'clientes'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.toggle('hidden', s !== t);
                document.getElementById(`tab-${s}`).classList.toggle('active', s === t);
            });
            document.getElementById('panel-preview').classList.toggle('hidden', t !== 'editor');
        }

        function addItem() {
            const name = document.getElementById('i-name').value.toUpperCase();
            const price = Number(document.getElementById('i-price').value);
            const qty = Number(document.getElementById('i-qty').value);
            if(!name || price <= 0) return alert("Ingresa nombre y precio válido");
            items.push({ name, price, qty, total: price * qty });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = "";
            renderPreview();
        }

        function renderPreview() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc').value || '---';
            const folio = `COT_EUREKALAB-${window.lastFolio || 1000} - ${desc.toUpperCase()}`;
            
            document.getElementById('p-date').innerText = new Date().toLocaleDateString('es-CL');
            document.getElementById('p-client').innerText = client || '---';
            document.getElementById('p-folio').innerText = folio;

            const tbody = document.getElementById('p-body');
            tbody.innerHTML = "";
            let total = 0;
            items.forEach((it, i) => {
                total += it.total;
                tbody.innerHTML += `
                    <tr style="border-bottom:1px solid #f1f5f9">
                        <td style="padding:15px; font-size:14px"><b>${it.name}</b></td>
                        <td style="padding:15px; text-align:center; font-weight:bold">${it.qty}</td>
                        <td style="padding:15px; text-align:right; font-weight:900">$${it.total.toLocaleString('es-CL')}</td>
                    </tr>`;
            });
            document.getElementById('p-total').innerText = `$${total.toLocaleString('es-CL')}`;
            
            document.getElementById('items-list').innerHTML = items.map((it, i) => `
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl border border-slate-700 text-xs">
                    <span class="font-bold uppercase">${it.name}</span>
                    <button onclick="items.splice(${i},1); renderPreview();" class="text-red-400 font-bold px-3">✕</button>
                </div>`).join('');
        }

        async function saveAndProcess() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc').value;
            if(!client || items.length === 0) return alert("Falta cliente o productos");

            const folioCode = `COT_EUREKALAB-${window.lastFolio} - ${desc.toUpperCase()}`;
            const data = { 
                folio: window.lastFolio, 
                folioCode, client, desc, items, 
                total: items.reduce((s,i)=>s+i.total,0), 
                date: new Date().toLocaleDateString('es-CL') 
            };

            if(editingCotId) {
                await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingCotId), data);
                editingCotId = null;
            } else {
                await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
                await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) });
            }

            // GENERAR PDF Y COMPARTIR NATIVAMENTE
            const element = document.getElementById('pdf-area');
            const opt = { margin:0, filename: folioCode+'.pdf', html2canvas:{scale:2, useCORS:true}, jsPDF:{format:'a4', orientation:'portrait'} };
            
            const blob = await html2pdf().from(element).set(opt).output('blob');
            const file = new File([blob], folioCode+'.pdf', { type: 'application/pdf' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: folioCode, text: 'Cotización Eureka! Lab' });
            } else {
                html2pdf().from(element).set(opt).save();
            }
            
            items = []; document.getElementById('q-desc').value = ""; renderPreview();
            alert("Guardado y procesado con éxito");
        }

        // --- GESTIÓN CLIENTES ---
        function updateClientSelectors() {
            const sel = document.getElementById('q-client');
            const current = sel.value;
            sel.innerHTML = '<option value="">-- Seleccionar Cliente --</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            sel.value = current;
        }

        function renderClientManager() {
            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `
                <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center border border-slate-700 shadow-lg">
                    <span class="font-black text-sm uppercase italic">${c.name}</span>
                    <div class="flex gap-3">
                        <button onclick="editClient('${c.id}', '${c.name}')" class="text-blue-400 font-bold text-[10px]">EDITAR</button>
                        <button onclick="deleteClient('${c.id}')" class="text-red-500 font-bold text-[10px]">BORRAR</button>
                    </div>
                </div>`).join('');
        }

        async function saveClient() {
            const name = document.getElementById('c-name').value.toUpperCase();
            if(!name) return;
            if(editingClientId) {
                await fb.updateDoc(fb.doc(fb.db, "erp_clientes", editingClientId), { name });
                editingClientId = null;
                document.getElementById('btn-client-action').innerText = "Registrar Cliente";
            } else {
                await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name });
            }
            document.getElementById('c-name').value = "";
        }

        function editClient(id, name) {
            editingClientId = id;
            document.getElementById('c-name').value = name;
            document.getElementById('btn-client-action').innerText = "Guardar Cambios";
        }

        async function deleteClient(id) {
            if(confirm("¿Eliminar cliente?")) await fb.deleteDoc(fb.doc(fb.db, "erp_clientes", id));
        }

        // --- GESTIÓN HISTORIAL ---
        function renderHistory() {
            document.getElementById('sec-historial').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-4 rounded-2xl border-l-8 border-blue-600 shadow-2xl">
                    <p class="text-[9px] font-black opacity-40 mb-1 uppercase tracking-tighter">${h.folioCode}</p>
                    <p class="font-black text-sm uppercase italic tracking-tight">${h.client}</p>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-emerald-400 font-black tracking-widest">$${h.total.toLocaleString('es-CL')}</span>
                        <div class="flex gap-2">
                            <button onclick="editCot('${h.id}')" class="bg-blue-600 px-4 py-2 rounded-lg text-[9px] font-black uppercase shadow-lg">Editar</button>
                            <button onclick="deleteCot('${h.id}')" class="bg-red-900/50 text-red-400 px-4 py-2 rounded-lg text-[9px] font-black uppercase">Borrar</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function editCot(id) {
            const h = window.historial.find(x => x.id === id);
            items = [...h.items];
            document.getElementById('q-client').value = h.client;
            document.getElementById('q-desc').value = h.desc || "";
            editingCotId = id;
            switchTab('editor');
            renderPreview();
        }

        async function deleteCot(id) {
            if(confirm("¿Deseas eliminar permanentemente esta cotización?")) {
                await fb.deleteDoc(fb.doc(fb.db, "erp_cotizaciones", id));
            }
        }
    </script>
</body>
</html>
