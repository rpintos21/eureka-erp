<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eureka! Lab ERP v23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            if(d.exists()) { window.currentFolio = d.data().lastFolio; renderPreview(); }
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateUI();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; overflow: hidden; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 14px; border-radius: 12px; width: 100%; color: white; font-size: 16px; }
        .tab-btn { padding: 16px; flex: 1; text-align: center; font-weight: 800; font-size: 11px; color: #64748b; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: #1e293b; }
        
        #pdf-canvas { 
            background: white; color: #1e293b; width: 210mm; min-height: 297mm; 
            padding: 15mm; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.35); transform-origin: top center;
        }
        @media (min-width: 1024px) { #pdf-canvas { transform: scale(0.75); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="flex bg-slate-900 border-b border-slate-800">
        <button onclick="setTab('edit')" id="tab-edit" class="tab-btn tab-active">Editor</button>
        <button onclick="setTab('hist')" id="tab-hist" class="tab-btn">Historial</button>
        <button onclick="setTab('clients')" id="tab-clients" class="tab-btn">Clientes</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        <aside class="lg:w-1/3 bg-slate-900 overflow-y-auto p-4 space-y-6">
            <div id="panel-edit" class="space-y-4">
                <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                <input type="text" id="q-desc" placeholder="Descripción del Folio" class="input-dark" oninput="renderPreview()">

                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 space-y-3">
                    <input type="text" id="i-name" placeholder="Servicio/Producto" class="input-dark">
                    <div class="flex gap-2">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center w-20">
                        <input type="number" id="i-price" placeholder="Precio $" class="input-dark flex-1">
                        <button onclick="document.getElementById('f-img').click()" id="b-img" class="bg-slate-700 px-4 rounded-xl text-xl">📷</button>
                    </div>
                    <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                    <button onclick="addItem()" class="w-full bg-blue-600 py-3 rounded-xl font-black">+ AÑADIR</button>
                </div>

                <div id="items-list" class="space-y-2"></div>
                <button onclick="saveAndSend()" class="w-full bg-emerald-500 py-4 rounded-2xl font-black text-lg uppercase shadow-xl">Guardar y Enviar</button>
            </div>

            <div id="panel-hist" class="hidden space-y-3"></div>
            <div id="panel-clients" class="hidden space-y-4">
                <div class="flex gap-2"><input type="text" id="c-new" placeholder="Nuevo Cliente" class="input-dark"><button onclick="addClient()" class="bg-blue-600 px-4 rounded-xl font-bold">+</button></div>
                <div id="clients-list" class="space-y-2"></div>
            </div>
        </aside>

        <main id="preview-pane" class="lg:w-2/3 bg-slate-800 overflow-y-auto p-4 flex justify-center">
            <div id="pdf-canvas">
                <div style="display:flex; justify-content:space-between; border-bottom:4px solid #0f172a; padding-bottom:20px; margin-bottom:30px">
                    <div><img src="logo.png" style="height:90px"></div>
                    <div style="text-align:right">
                        <h2 id="p-folio" style="font-size:14px; font-weight:800; margin:0">COT_EUREKALAB-1000</h2>
                        <p style="font-size:12px; margin:10px 0 0">Fecha: <span id="p-date"></span></p>
                        <p style="font-size:12px; margin:0">Cliente: <span id="p-client" style="font-weight:800"></span></p>
                    </div>
                </div>

                <table style="width:100%; border-collapse:collapse">
                    <thead><tr style="border-bottom:2px solid #0f172a; font-size:10px; color:#64748b"><th style="padding:10px; text-align:left">DETALLE</th><th style="padding:10px; text-align:center">CANT</th><th style="padding:10px; text-align:right">TOTAL</th></tr></thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top:40px; text-align:right; border-top:1px solid #eee; pt-20">
                    <p style="font-size:10px; color:#64748b; margin:0">TOTAL NETO</p>
                    <h2 id="p-total" style="font-size:40px; font-weight:900; margin:0">$0</h2>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], tempImg = null, editingId = null;

        function setTab(t) {
            ['edit', 'hist', 'clients'].forEach(s => {
                document.getElementById('panel-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            document.getElementById('preview-pane').classList.toggle('hidden', t !== 'edit');
        }

        function handleImg(input) {
            const r = new FileReader();
            r.onload = e => { tempImg = e.target.result; document.getElementById('b-img').innerHTML = "✅"; };
            r.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const n = document.getElementById('i-name').value.toUpperCase(), p = Number(document.getElementById('i-price').value), q = Number(document.getElementById('i-qty').value);
            if(!n || p <= 0) return;
            items.push({ name: n, price: p, qty: q, total: p * q, img: tempImg });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = "";
            tempImg = null; document.getElementById('b-img').innerHTML = "📷";
            renderPreview();
        }

        function renderPreview() {
            document.getElementById('p-date').innerText = new Date().toLocaleDateString('es-CL');
            document.getElementById('p-client').innerText = document.getElementById('q-client').value || '---';
            const desc = document.getElementById('q-desc').value || 'S/D';
            document.getElementById('p-folio').innerText = `COT_EUREKALAB-${window.currentFolio || 1000} - ${desc.toUpperCase()}`;

            const tbody = document.getElementById('p-body');
            tbody.innerHTML = items.map(it => `
                <tr style="border-bottom:1px solid #f1f5f9">
                    <td style="padding:12px 5px; font-size:13px">
                        <div style="display:flex; align-items:center; gap:10px">
                            ${it.img ? `<img src="${it.img}" style="width:50px; height:50px; object-fit:contain; background:#f8fafc; border-radius:6px">` : ''}
                            <b>${it.name}</b>
                        </div>
                    </td>
                    <td style="padding:12px 5px; text-align:center">${it.qty}</td>
                    <td style="padding:12px 5px; text-align:right; font-weight:800">$${it.total.toLocaleString('es-CL')}</td>
                </tr>
            `).join('');
            const tot = items.reduce((s,i) => s + i.total, 0);
            document.getElementById('p-total').innerText = `$${tot.toLocaleString('es-CL')}`;
            document.getElementById('items-list').innerHTML = items.map((it, i) => `<div class="flex justify-between bg-slate-800 p-2 rounded-lg text-xs"><span>${it.name}</span><button onclick="items.splice(${i},1);renderPreview();" class="text-red-400 font-bold">✕</button></div>`).join('');
        }

        async function saveAndSend() {
            const client = document.getElementById('q-client').value, desc = document.getElementById('q-desc').value;
            if(!client || items.length === 0) return alert("Faltan datos");

            const folioStr = `COT_EUREKALAB-${window.currentFolio} - ${desc.toUpperCase()}`;
            const data = { folio: window.currentFolio, folioCode: folioStr, client, desc, items: items.map(it=>({...it, img: it.img?'HAS_IMG':null})), total: items.reduce((s,i)=>s+i.total,0), date: new Date().toLocaleDateString('es-CL') };

            try {
                if(editingId) { await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data); editingId = null; }
                else { await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data); await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) }); }

                const opt = { margin:0, filename: folioStr+'.pdf', html2canvas:{scale:2, useCORS:true}, jsPDF:{unit:'mm', format:'a4'} };
                const worker = html2pdf().from(document.getElementById('pdf-canvas')).set(opt);
                
                const blob = await worker.output('blob');
                const file = new File([blob], folioStr+'.pdf', { type: 'application/pdf' });

                if (navigator.share) {
                    await navigator.share({ files: [file], title: folioStr }).catch(() => worker.save());
                } else {
                    worker.save();
                }

                items = []; document.getElementById('q-desc').value = ""; renderPreview();
                alert("Guardado con éxito");
            } catch (e) { alert("Error al guardar: " + e.message); }
        }

        function updateUI() {
            const sel = document.getElementById('q-client'); sel.innerHTML = '<option value="">CLIENTE</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `<div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center"><b>${c.name}</b><button onclick="fb.deleteDoc(fb.doc(fb.db,'erp_clientes','${c.id}'))" class="text-red-500 font-bold">✕</button></div>`).join('');
        }

        async function addClient() {
            const n = document.getElementById('c-new').value.toUpperCase();
            if(n) { await fb.addDoc(fb.collection(fb.db,"erp_clientes"), {name:n}); document.getElementById('c-new').value=""; }
        }

        function renderHistory() {
            document.getElementById('panel-hist').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-blue-500">
                    <p class="text-[9px] opacity-50">${h.folioCode}</p>
                    <p class="font-bold text-sm uppercase">${h.client}</p>
                    <div class="flex justify-between mt-3"><b>$${h.total.toLocaleString()}</b>
                        <div class="flex gap-2">
                            <button onclick="loadEdit('${h.id}')" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">EDITAR</button>
                            <button onclick="fb.deleteDoc(fb.doc(fb.db,'erp_cotizaciones','${h.id}'))" class="bg-red-900/40 px-3 py-1 rounded text-[10px] font-bold text-red-400">BORRAR</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function loadEdit(id) {
            const h = window.historial.find(x => x.id === id); items = [...h.items];
            document.getElementById('q-client').value = h.client; document.getElementById('q-desc').value = h.desc || "";
            editingId = id; setTab('edit'); renderPreview();
        }
    </script>
</body>
</html>
