<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eureka! Lab ERP v33</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.currentFolio = (d.exists() && d.data().lastFolio) ? Number(d.data().lastFolio) : 1000;
            renderPreview();
        }, (err) => { window.currentFolio = 1000; });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateUI();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; color: white; font-size: 14px; }
        .tab-btn { padding: 16px; flex: 1; text-align: center; font-weight: 800; font-size: 10px; color: #64748b; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: #1e293b; }
        
        /* Contenedor que permite Scroll Lateral en móvil pero fija el A4 */
        #preview-pane { background: #1e293b; overflow-x: auto; padding: 10px; display: flex; justify-content: center; }
        
        /* Ajuste de la hoja: En móvil ocupa el 100% de ancho del viewport */
        #pdf-canvas { 
            background: white; color: #1e293b; 
            width: 210mm; min-height: 297mm; 
            padding: 15mm; flex-shrink: 0;
            transform-origin: top center;
        }

        @media (max-width: 1024px) {
            #pdf-canvas {
                transform: scale(calc(100vw / 230mm)); /* Ajuste dinámico al ancho del celular */
                margin-bottom: -150mm; /* Compensa el espacio del transform */
            }
        }
        @media (min-width: 1025px) {
            #pdf-canvas { transform: scale(0.75); }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="flex bg-slate-900 border-b border-slate-800 shrink-0">
        <button onclick="setTab('edit')" id="tab-edit" class="tab-btn tab-active">Cotizador</button>
        <button onclick="setTab('hist')" id="tab-hist" class="tab-btn">Historial</button>
        <button onclick="setTab('clients')" id="tab-clients" class="tab-btn">Clientes</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        <aside class="lg:w-1/3 bg-slate-900 overflow-y-auto p-4 space-y-4 border-r border-slate-800">
            <div id="panel-edit" class="space-y-4">
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Configuración</p>
                    <input type="date" id="q-date-input" class="input-dark" oninput="renderPreview()">
                    <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                    <input type="text" id="q-desc" placeholder="Proyecto / Asunto" class="input-dark" oninput="renderPreview()">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="q-phone" placeholder="WhatsApp" class="input-dark" oninput="renderPreview()">
                        <input type="text" id="q-mail" placeholder="E-mail" class="input-dark" oninput="renderPreview()">
                    </div>
                    <input type="text" id="q-address" placeholder="Dirección" class="input-dark" oninput="renderPreview()">
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 space-y-3">
                    <textarea id="i-name" placeholder="Descripción del producto..." class="input-dark h-20 resize-none"></textarea>
                    <div class="flex gap-2">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center w-20">
                        <input type="number" id="i-price" placeholder="$ Precio" class="input-dark flex-1">
                        <button onclick="document.getElementById('f-img').click()" id="b-img" class="bg-slate-700 px-4 rounded-xl text-xl">📷</button>
                    </div>
                    <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                    <button onclick="addItem()" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Añadir Item</button>
                </div>
                <div id="items-list" class="space-y-2"></div>
                <button onclick="saveAndSend()" class="w-full bg-emerald-500 py-4 rounded-2xl font-black text-lg uppercase shadow-xl mt-4">Guardar y Enviar</button>
            </div>

            <div id="panel-hist" class="hidden space-y-3 p-2"></div>

            <div id="panel-clients" class="hidden space-y-4 p-2">
                <div class="bg-slate-800 p-4 rounded-xl space-y-2">
                    <input type="text" id="c-new" placeholder="Nombre de Cliente" class="input-dark">
                    <button onclick="saveClient()" id="btn-client-save" class="w-full bg-blue-600 py-2 rounded-lg font-bold">REGISTRAR</button>
                </div>
                <div id="clients-list" class="space-y-2"></div>
            </div>
        </aside>

        <main id="preview-pane" class="lg:w-2/3 overflow-y-auto">
            <div id="pdf-canvas">
                <div style="display:flex; justify-content:space-between; align-items: flex-start; margin-bottom: 25px; border-bottom: 3px solid #0f172a; padding-bottom: 15px;">
                    <div><img src="logo.png" style="height:70px; object-fit: contain;"></div>
                    <div style="text-align:right;">
                        <h2 id="p-folio" style="font-size:14px; font-weight:800; margin:0; color: #0f172a;">COT_EUREKALAB-1000</h2>
                        <p style="font-size:10px; margin:5px 0 0; color: #94a3b8; font-weight: 700;">FECHA: <span id="p-date" style="color:#0f172a"></span></p>
                    </div>
                </div>

                <div style="margin-bottom: 25px; font-size: 11px; color: #1e293b; line-height: 1.4; background: #f8fafc; padding: 15px; border-radius: 8px;">
                    <p style="font-size: 8px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px;">RECEPTOR:</p>
                    <b id="p-client" style="font-size: 13px; text-transform: uppercase; color: #0f172a;">---</b><br>
                    <span id="p-contact-val"></span><br>
                    <span id="p-address-val"></span>
                </div>

                <table style="width:100%; border-collapse:collapse; margin-bottom: 30px;">
                    <thead>
                        <tr style="background: #f1f5f9; border-bottom: 2px solid #0f172a;">
                            <th style="padding: 10px; text-align: center; font-size: 9px; width: 35px;">CANT</th>
                            <th style="padding: 10px; text-align: left; font-size: 9px;">DESCRIPCIÓN</th>
                            <th style="padding: 10px; text-align: center; font-size: 9px; width: 130px;">IMAGEN</th>
                            <th style="padding: 10px; text-align: right; font-size: 9px; width: 90px;">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="display: flex; justify-content: flex-end;">
                    <div style="width: 220px; border-top: 1px solid #e2e8f0; padding-top: 10px;">
                        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px;">
                            <span>Neto:</span><b id="p-sub">$0</b>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px;">
                            <span>IVA (19%):</span><b id="p-iva">$0</b>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #0f172a; padding-top: 8px;">
                            <span style="font-size: 9px; font-weight: 800; color: #3b82f6;">TOTAL VENTA</span>
                            <h2 id="p-total" style="font-size: 30px; font-weight: 900; margin: 0; color: #0f172a;">$0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], tempImg = null, editingId = null, editingClientId = null;
        
        // Inicializar fecha de hoy
        document.getElementById('q-date-input').valueAsDate = new Date();

        function setTab(t) {
            ['edit', 'hist', 'clients'].forEach(s => {
                document.getElementById('panel-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            document.getElementById('preview-pane').classList.toggle('hidden', t !== 'edit');
        }

        function handleImg(input) {
            const r = new FileReader();
            r.onload = e => { tempImg = e.target.result; document.getElementById('b-img').innerHTML = "✅"; };
            r.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const n = (document.getElementById('i-name').value || "S/D").toUpperCase(), p = Number(document.getElementById('i-price').value), q = Number(document.getElementById('i-qty').value);
            if(p <= 0) return;
            items.push({ name: n, price: p, qty: q, total: p * q, img: tempImg });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = ""; tempImg = null; document.getElementById('b-img').innerHTML = "📷";
            renderPreview();
        }

        function renderPreview() {
            const dateInput = document.getElementById('q-date-input').value;
            const formattedDate = dateInput ? new Date(dateInput + 'T12:00:00').toLocaleDateString('es-CL') : new Date().toLocaleDateString('es-CL');
            
            document.getElementById('p-date').innerText = formattedDate;
            document.getElementById('p-client').innerText = document.getElementById('q-client').value || '---';
            const ph = document.getElementById('q-phone').value, ml = document.getElementById('q-mail').value;
            document.getElementById('p-contact-val').innerText = (ph || ml) ? `${ph} | ${ml}` : '';
            document.getElementById('p-address-val').innerText = document.getElementById('q-address').value || '';
            const f = window.currentFolio || 1000, d = document.getElementById('q-desc').value || '---';
            document.getElementById('p-folio').innerText = `COT_EUREKALAB-${f} - ${d.toUpperCase()}`;

            const b = document.getElementById('p-body');
            b.innerHTML = items.map(it => `
                <tr style="border-bottom: 1px solid #f1f5f9; vertical-align: middle;">
                    <td style="padding: 10px; text-align: center; font-weight: 700;">${it.qty}</td>
                    <td style="padding: 10px; font-size: 11px; font-weight: 500; white-space: pre-wrap;">${it.name}</td>
                    <td style="padding: 10px; text-align: center;">
                        ${it.img ? `<img src="${it.img}" style="max-height: 40mm; max-width: 38mm; object-fit: contain; border-radius: 4px;">` : ''}
                    </td>
                    <td style="padding: 10px; text-align: right; font-weight: 800; color: #0f172a;">$${it.total.toLocaleString('es-CL')}</td>
                </tr>
            `).join('');

            const n = items.reduce((s,i) => s + i.total, 0), v = Math.round(n * 0.19);
            document.getElementById('p-sub').innerText = `$${n.toLocaleString('es-CL')}`;
            document.getElementById('p-iva').innerText = `$${v.toLocaleString('es-CL')}`;
            document.getElementById('p-total').innerText = `$${(n + v).toLocaleString('es-CL')}`;
            document.getElementById('items-list').innerHTML = items.map((it, i) => `<div class="flex justify-between bg-slate-800 p-2 rounded text-xs items-center"><span>${it.name.substring(0,25)}</span><button onclick="items.splice(${i},1);renderPreview();" class="text-red-400 px-2 font-bold">✕</button></div>`).join('');
        }

        async function saveAndSend() {
            const c = document.getElementById('q-client').value;
            if(!c || items.length === 0) return alert("Falta cliente o items");
            const f = window.currentFolio || 1000, d = document.getElementById('q-desc').value.toUpperCase();
            const s = `COT_EUREKALAB-${f} - ${d}`;
            const dateToSave = document.getElementById('q-date-input').value;
            
            const data = { 
                folio: f, folioCode: s, client: c, 
                phone: document.getElementById('q-phone').value, 
                mail: document.getElementById('q-mail').value, 
                address: document.getElementById('q-address').value, 
                desc: document.getElementById('q-desc').value, 
                items: items.map(it=>({...it, img: it.img?'IMG':null})), 
                neto: items.reduce((s,i)=>s+i.total,0), 
                date: dateToSave 
            };

            try {
                if(editingId) { await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data); }
                else {
                    const cfgRef = fb.doc(fb.db, "config", "eureka_erp_v10");
                    await fb.updateDoc(cfgRef, { lastFolio: fb.increment(1) });
                    await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
                }
                
                // GENERAR PDF CON IMÁGENES FORZADAS
                const element = document.getElementById('pdf-canvas');
                const opt = { 
                    margin: 0, 
                    filename: s + '.pdf', 
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 3, 
                        useCORS: true, 
                        letterRendering: true,
                        allowTaint: false
                    }, 
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                };

                const worker = html2pdf().from(element).set(opt);
                const blob = await worker.output('blob');
                const file = new File([blob], s + '.pdf', { type: 'application/pdf' });

                if (navigator.share) {
                    await navigator.share({ files: [file], title: s }).catch(() => worker.save());
                } else {
                    worker.save();
                }

                items = []; document.getElementById('q-desc').value = ""; editingId = null; renderPreview();
                alert("¡Guardado y PDF generado!");
            } catch (e) { alert("Error: " + e.message); }
        }

        function updateUI() {
            const sel = document.getElementById('q-client'); sel.innerHTML = '<option value="">-- CLIENTE --</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `
                <div class="bg-slate-800 p-3 rounded flex justify-between items-center">
                    <b class="text-sm uppercase">${c.name}</b>
                    <div class="flex gap-2">
                        <button onclick="editClient('${c.id}', '${c.name}')" class="text-blue-400 font-bold text-xs">EDITAR</button>
                        <button onclick="fb.deleteDoc(fb.doc(fb.db,'erp_clientes','${c.id}'))" class="text-red-500 font-bold text-xs">✕</button>
                    </div>
                </div>`).join('');
        }

        async function saveClient() {
            const n = document.getElementById('c-new').value.toUpperCase(); if(!n) return;
            if(editingClientId) { await fb.updateDoc(fb.doc(fb.db, "erp_clientes", editingClientId), { name: n }); editingClientId = null; document.getElementById('btn-client-save').innerText = "REGISTRAR"; }
            else { await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name: n }); }
            document.getElementById('c-new').value = "";
        }

        function editClient(id, name) { editingClientId = id; document.getElementById('c-new').value = name; document.getElementById('btn-client-save').innerText = "GUARDAR"; }

        function renderHistory() {
            document.getElementById('panel-hist').innerHTML = window.historial.map(h => {
                const hDate = h.date ? new Date(h.date + 'T12:00:00').toLocaleDateString('es-CL') : 'S/F';
                return `
                <div class="bg-slate-800 p-4 rounded border-l-4 border-emerald-500 mb-2">
                    <div class="flex justify-between items-start mb-1">
                        <p class="text-[9px] opacity-40 font-bold">${h.folioCode}</p>
                        <p class="text-[9px] opacity-60 font-bold">${hDate}</p>
                    </div>
                    <p class="font-bold text-sm uppercase">${h.client}</p>
                    <div class="flex justify-between mt-2 items-center">
                        <b class="text-emerald-400">$${Math.round(h.neto * 1.19).toLocaleString()}</b>
                        <button onclick="loadEdit('${h.id}')" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">EDITAR</button>
                    </div>
                </div>`}).join('');
        }

        function loadEdit(id) {
            const h = window.historial.find(x => x.id === id); 
            items = [...h.items];
            document.getElementById('q-client').value = h.client; 
            document.getElementById('q-desc').value = h.desc || "";
            document.getElementById('q-phone').value = h.phone || ""; 
            document.getElementById('q-mail').value = h.mail || "";
            document.getElementById('q-address').value = h.address || "";
            if(h.date) document.getElementById('q-date-input').value = h.date;
            
            editingId = id; setTab('edit'); renderPreview();
        }
    </script>
</body>
</html>
