<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eureka! ERP v18 - Ultra Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.lastFolio = d.exists() ? d.data().lastFolio : 1000;
            renderPreview();
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateClientSelectors();
            renderClientManager();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; width: 100%; color: white; }
        .btn-tab { flex: 1; padding: 12px; font-size: 11px; font-weight: 800; color: #64748b; border-bottom: 2px solid transparent; }
        .btn-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; background: #0f172a; }
        
        /* Contenedor del PDF */
        .paper-container { background: #525659; padding: 20px; display: flex; justify-content: center; overflow-x: auto; }
        #pdf-area { background: white; color: #1e293b; width: 210mm; min-height: 297mm; padding: 15mm; box-shadow: 0 0 20px rgba(0,0,0,0.5); transform: scale(0.45); transform-origin: top center; }
        @media (min-width: 1024px) { #pdf-area { transform: scale(0.8); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="flex bg-slate-950 border-b border-slate-800">
        <button onclick="switchTab('editor')" id="tab-editor" class="btn-tab active">EDITOR</button>
        <button onclick="switchTab('historial')" id="tab-historial" class="btn-tab">HISTORIAL</button>
        <button onclick="switchTab('clientes')" id="tab-clientes" class="btn-tab">CLIENTES</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <aside id="panel-controls" class="lg:w-1/3 bg-slate-900 border-r border-slate-800 overflow-y-auto p-5 space-y-4">
            
            <div id="sec-editor" class="space-y-4">
                <div class="grid grid-cols-1 gap-3">
                    <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                    <input type="text" id="q-desc" placeholder="Descripción del Folio" class="input-dark" oninput="renderPreview()">
                </div>

                <div class="bg-slate-800 p-4 rounded-xl space-y-3">
                    <input type="text" id="i-name" placeholder="Producto..." class="input-dark">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center">
                        <input type="number" id="i-price" placeholder="$ Precio" class="input-dark">
                    </div>
                    <button onclick="addItem()" class="w-full bg-blue-600 py-3 rounded-lg font-bold uppercase text-xs">Añadir Item</button>
                </div>

                <div id="items-list" class="space-y-2"></div>
                
                <button onclick="saveAndPDF()" class="w-full bg-emerald-500 py-4 rounded-xl font-black uppercase text-sm shadow-lg">Guardar y Enviar PDF</button>
            </div>

            <div id="sec-historial" class="hidden space-y-3"></div>

            <div id="sec-clientes" class="hidden space-y-4">
                <div class="bg-slate-800 p-4 rounded-xl space-y-2">
                    <input type="text" id="c-name" placeholder="Nombre Cliente" class="input-dark">
                    <button onclick="saveClient()" id="btn-client-action" class="w-full bg-blue-600 py-2 rounded font-bold">Añadir Cliente</button>
                </div>
                <div id="clients-list" class="space-y-2"></div>
            </div>
        </aside>

        <main id="panel-preview" class="lg:w-2/3 paper-container overflow-y-auto">
            <div id="pdf-area">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:5px solid #0f172a; padding-bottom:20px; margin-bottom:20px">
                    <div style="width:50%">
                        <img src="logo.png" style="height:80px; margin-bottom:10px" onerror="this.style.display='none'">
                        <h1 style="font-size:28px; margin:0; font-weight:900">EUREKA! LAB</h1>
                        <p style="font-size:10px; color:#64748b; margin:0">DISEÑO Y PRODUCCIÓN INDUSTRIAL</p>
                    </div>
                    <div style="text-align:right">
                        <div style="background:#0f172a; color:white; padding:10px; border-radius:10px">
                            <p style="font-size:8px; margin:0; opacity:0.7">FOLIO COTIZACIÓN</p>
                            <h2 id="p-folio" style="margin:0; font-size:12px">COT_EUREKALAB-1000</h2>
                        </div>
                        <p style="font-size:11px; margin-top:10px"><b>Fecha:</b> <span id="p-date"></span></p>
                        <p style="font-size:11px"><b>Cliente:</b> <span id="p-client">---</span></p>
                    </div>
                </div>

                <table style="width:100%; border-collapse:collapse">
                    <thead style="background:#f1f5f9; font-size:10px; text-transform:uppercase">
                        <tr>
                            <th style="padding:12px; text-align:left">Descripción</th>
                            <th style="padding:12px; text-align:center">Cant</th>
                            <th style="padding:12px; text-align:right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top:40px; border-top:2px solid #f1f5f9; padding-top:20px; text-align:right">
                    <p style="font-size:11px; font-weight:bold; color:#64748b; margin:0">TOTAL NETO</p>
                    <h2 id="p-total" style="font-size:35px; margin:0; font-weight:900">$0</h2>
                </div>
            </div>
        </main>

    </div>

    <script>
        let items = [], editingCotId = null, editingClientId = null;

        function switchTab(t) {
            ['editor', 'historial', 'clientes'].forEach(s => {
                document.getElementById(`sec-${s}`).classList.toggle('hidden', s !== t);
                document.getElementById(`tab-${s}`).classList.toggle('active', s === t);
            });
            document.getElementById('panel-preview').classList.toggle('hidden', t !== 'editor');
        }

        function addItem() {
            const name = document.getElementById('i-name').value.toUpperCase();
            const price = Number(document.getElementById('i-price').value);
            const qty = Number(document.getElementById('i-qty').value);
            if(!name || price <= 0) return;
            items.push({ name, price, qty, total: price * qty });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = "";
            renderPreview();
        }

        function renderPreview() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc').value || '---';
            const folio = `COT_EUREKALAB-${window.lastFolio || 1000} - ${desc.toUpperCase()}`;
            
            document.getElementById('p-date').innerText = new Date().toLocaleDateString('es-CL');
            document.getElementById('p-client').innerText = client || '---';
            document.getElementById('p-folio').innerText = folio;

            const tbody = document.getElementById('p-body');
            tbody.innerHTML = "";
            let total = 0;
            items.forEach((it, i) => {
                total += it.total;
                tbody.innerHTML += `<tr style="border-bottom:1px solid #eee"><td style="padding:10px; font-size:12px"><b>${it.name}</b></td><td style="padding:10px; text-align:center">${it.qty}</td><td style="padding:10px; text-align:right; font-weight:bold">$${it.total.toLocaleString()}</td></tr>`;
            });
            document.getElementById('p-total').innerText = `$${total.toLocaleString()}`;
            
            document.getElementById('items-list').innerHTML = items.map((it, i) => `<div class="flex justify-between bg-slate-800 p-2 rounded text-xs"><span>${it.name}</span><button onclick="items.splice(${i},1); renderPreview();" class="text-red-400 font-bold px-2">✕</button></div>`).join('');
        }

        async function saveAndPDF() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc').value;
            if(!client || items.length === 0) return alert("Faltan datos");

            const folioCode = `COT_EUREKALAB-${window.lastFolio}-${desc.toUpperCase()}`;
            const data = { folio: window.lastFolio, folioCode, client, desc, items, total: items.reduce((s,i)=>s+i.total,0), date: new Date().toLocaleDateString('es-CL') };

            if(editingCotId) {
                await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingCotId), data);
                editingCotId = null;
            } else {
                await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
                await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) });
            }

            const element = document.getElementById('pdf-area');
            html2pdf().from(element).set({ margin:0, filename: folioCode+'.pdf', html2canvas:{scale:2}, jsPDF:{format:'a4'} }).save();
            
            items = []; document.getElementById('q-desc').value = ""; renderPreview();
            alert("Guardado");
        }

        // CLIENTES
        function updateClientSelectors() {
            const sel = document.getElementById('q-client');
            const current = sel.value;
            sel.innerHTML = '<option value="">-- Cliente --</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            sel.value = current;
        }

        function renderClientManager() {
            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `
                <div class="bg-slate-800 p-3 rounded-lg flex justify-between items-center">
                    <span class="text-sm font-bold">${c.name}</span>
                    <div class="flex gap-2">
                        <button onclick="editClient('${c.id}', '${c.name}')" class="text-blue-400 text-[10px] font-bold">EDITAR</button>
                        <button onclick="deleteClient('${c.id}')" class="text-red-500 text-[10px] font-bold">BORRAR</button>
                    </div>
                </div>
            `).join('');
        }

        async function saveClient() {
            const name = document.getElementById('c-name').value.toUpperCase();
            if(!name) return;
            if(editingClientId) {
                await fb.updateDoc(fb.doc(fb.db, "erp_clientes", editingClientId), { name });
                editingClientId = null;
                document.getElementById('btn-client-action').innerText = "Añadir Cliente";
            } else {
                await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name });
            }
            document.getElementById('c-name').value = "";
        }

        function editClient(id, name) {
            editingClientId = id;
            document.getElementById('c-name').value = name;
            document.getElementById('btn-client-action').innerText = "Guardar Cambios";
        }

        async function deleteClient(id) {
            if(confirm("¿Eliminar cliente?")) await fb.deleteDoc(fb.doc(fb.db, "erp_clientes", id));
        }

        // HISTORIAL
        function renderHistory() {
            document.getElementById('sec-historial').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-3 rounded-xl border-l-4 border-blue-500">
                    <p class="text-[9px] font-bold opacity-50">${h.folioCode}</p>
                    <p class="font-bold text-sm uppercase">${h.client}</p>
                    <div class="flex justify-between mt-2">
                        <span class="text-emerald-400 font-bold">$${h.total.toLocaleString()}</span>
                        <div class="flex gap-2">
                            <button onclick="editCot('${h.id}')" class="text-blue-400 text-[10px] font-bold">EDITAR</button>
                            <button onclick="deleteCot('${h.id}')" class="text-red-500 text-[10px] font-bold">BORRAR</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editCot(id) {
            const h = window.historial.find(x => x.id === id);
            items = [...h.items];
            document.getElementById('q-client').value = h.client;
            document.getElementById('q-desc').value = h.desc || "";
            editingCotId = id;
            switchTab('editor');
            renderPreview();
        }

        async function deleteCot(id) {
            if(confirm("¿Eliminar cotización?")) await fb.deleteDoc(fb.doc(fb.db, "erp_cotizaciones", id));
        }
    </script>
</body>
</html>
