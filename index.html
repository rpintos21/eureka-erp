<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Eureka! ERP v126 - Iconos IMG PDF corregidos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {
            getFirestore,
            doc,
            onSnapshot,
            updateDoc,
            increment,
            collection,
            addDoc,
            deleteDoc,
            setDoc,
            getDoc,
            runTransaction
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.fb = {
            db,
            doc,
            updateDoc,
            increment,
            collection,
            addDoc,
            deleteDoc,
            setDoc,
            getDoc,
            runTransaction
        };

        window.addEventListener("DOMContentLoaded", () => {
            onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
                window.nextFolio = d.exists() ? Number(d.data().lastFolio) : 1000;
                if (window.renderPreview) window.renderPreview();
            });

            onSnapshot(collection(db, "erp_clientes"), (s) => {
                window.clientes = s.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")));

                if (window.updateUI) window.updateUI();
                if (window.renderPreview) window.renderPreview();
            });

            onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
                window.historial = s.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => Number(b.folio || 0) - Number(a.folio || 0));

                if (window.renderHistory) window.renderHistory();
            });
        });
    </script>
