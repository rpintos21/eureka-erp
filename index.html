<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Eureka ERP</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
    background:#020617;
    color:white;
    font-family:'Inter',sans-serif;
}

/* ===================== */
/* INPUTS */
/* ===================== */

.input-dark{
    background:#1e293b;
    border:1px solid #334155;
    padding:14px;
    border-radius:12px;
    width:100%;
    color:white;
    outline:none;
    font-size:16px;
}

/* ===================== */
/* TABS */
/* ===================== */

.tab-content{
    display:none;
    width:100%;
    padding:20px;
}

.tab-content.active{
    display:block;
}

/* ===================== */
/* PREVIEW */
/* ===================== */

.preview-column{
    flex:1;
    min-width:0;
    overflow:hidden;
}

.viewer-container{

    width:100%;
    max-width:100%;

    overflow-x:auto;
    overflow-y:auto;

    background:#020617;

    padding:16px 0 60px 0;

    min-height:50vh;

    -webkit-overflow-scrolling:touch;

    touch-action:pan-x pan-y;

    overscroll-behavior-x:contain;

    border-radius:12px;
}

.viewer-inner{

    width:820px;
    min-width:820px;
    max-width:820px;

    padding-right:26px;
}

/* ===================== */
/* HOJA */
/* ===================== */

.pdf-page{

    width:794px;
    height:1123px;

    min-width:794px;
    min-height:1123px;

    max-width:794px;
    max-height:1123px;

    padding:45px;

    background:white;
    color:#1e293b;

    display:flex;
    flex-direction:column;

    overflow:hidden;

    box-shadow:0 10px 30px rgba(0,0,0,.45);
}

/* ===================== */
/* HEADER */
/* ===================== */

.quote-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    border-bottom:4px solid #0f172a;

    padding-bottom:12px;
    margin-bottom:18px;
}

.quote-logo{
    height:58px;
    object-fit:contain;
}

/* ===================== */
/* CLIENTE */
/* ===================== */

.client-box{

    background:#f8fafc;

    border:1px solid #e2e8f0;

    border-radius:10px;

    padding:13px;

    margin-bottom:18px;

    display:flex;
    justify-content:space-between;

    gap:14px;
}

/* ===================== */
/* TABLA */
/* ===================== */

.items-table{
    width:100%;
    border-collapse:collapse;
}

.items-table th{

    background:#0f172a;
    color:white;

    font-size:9px;

    text-transform:uppercase;

    padding:9px 7px;
}

.items-table td{

    border-bottom:1px solid #e5e7eb;

    padding:9px 7px;

    font-size:11px;

    color:#1e293b;
}

.item-img{
    max-width:100%;
    max-height:20mm;
    border-radius:4px;
}

/* ===================== */
/* FOOTER */
/* ===================== */

.footer-box{
    margin-top:auto;
    border-top:2px solid #0f172a;
    padding-top:13px;
}

.payment-box{

    width:310px;

    background:#f0f9ff;

    border:1px solid #bae6fd;

    border-radius:10px;

    padding:10px;

    font-size:9px;

    color:#0c4a6e;
}

.total-box{
    width:215px;
    text-align:right;
}

.final-total{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.final-total h2{
    margin:0;
    font-size:22px;
    font-weight:900;
}

/* ===================== */
/* MODAL */
/* ===================== */

#quick-view-modal{

    position:fixed;
    inset:0;

    background:#020617;

    z-index:9999;

    display:none;

    flex-direction:column;
}

#qv-header{

    background:#0f172a;

    padding:15px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

#qv-body{

    flex:1;

    overflow-x:auto;
    overflow-y:auto;

    padding:16px 0 60px 0;

    -webkit-overflow-scrolling:touch;
}

.icon-btn{

    width:48px;
    height:48px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:14px;

    background:#1e293b;

    border:1px solid #334155;

    font-size:22px;

    color:white;
}

/* ===================== */
/* MOBILE */
/* ===================== */

@media screen and (max-width:700px){

    .tab-content{
        padding:10px;
    }

    .viewer-container{

        width:calc(100vw - 20px);
        max-width:calc(100vw - 20px);

        overflow-x:auto !important;
    }

    .viewer-inner{

        width:820px;
        min-width:820px;
    }
}

</style>
</head>

<body>

<!-- ===================== -->
<!-- NAV -->
<!-- ===================== -->

<nav class="flex bg-slate-950 border-b border-slate-800 sticky top-0 z-50 h-[60px]">

<button onclick="navTo('edit')" id="m-edit"
class="flex-1 p-4 font-black text-[11px] uppercase tracking-widest text-blue-500 border-b-2 border-blue-500">
Cotizador
</button>

<button onclick="navTo('hist')" id="m-hist"
class="flex-1 p-4 font-black text-[11px] uppercase tracking-widest text-slate-500 border-b-2 border-transparent">
Historial
</button>

</nav>

<!-- ===================== -->
<!-- MODAL -->
<!-- ===================== -->

<div id="quick-view-modal">

<div id="qv-header">

<button
onclick="closeQuickView()"
class="bg-slate-700 text-white px-5 py-2 rounded-xl font-bold uppercase text-xs">
Cerrar
</button>

<div class="flex gap-3">

<button id="qv-download-btn"
class="icon-btn text-blue-400">
⬇️
</button>

</div>

</div>

<div class="text-slate-400 text-xs font-bold uppercase tracking-widest px-4 pt-3">
Desliza la hoja hacia la derecha →
</div>

<div id="qv-body">

<div class="viewer-inner">

<div id="cloned-pdf-target" class="pdf-page"></div>

</div>

</div>

</div>

<!-- ===================== -->
<!-- EDIT -->
<!-- ===================== -->

<div id="sec-edit" class="tab-content active">

<div class="max-w-7xl mx-auto flex flex-row gap-8 items-start overflow-hidden">

<!-- PANEL -->

<div class="w-[380px] min-w-[380px] space-y-4 shrink-0">

<div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 space-y-3">

<input
type="date"
id="q-date-input"
class="input-dark"
onchange="renderPreview()"
>

<input
type="text"
id="q-client"
placeholder="Cliente"
class="input-dark"
oninput="renderPreview()"
>

<input
type="text"
id="q-desc"
placeholder="Nombre del proyecto..."
class="input-dark"
oninput="renderPreview()"
>

</div>

<div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-4">

<textarea
id="i-name"
placeholder="Descripción del producto..."
class="input-dark h-24 resize-none"
></textarea>

<div class="flex gap-3">

<input
type="number"
id="i-qty"
value="1"
min="1"
class="input-dark text-center w-20"
>

<input
type="number"
id="i-price"
placeholder="$ Precio"
min="0"
class="input-dark flex-1"
>

<button
onclick="document.getElementById('f-img').click()"
class="bg-slate-700 px-4 rounded-xl">
📷
</button>

</div>

<input
type="file"
id="f-img"
class="hidden"
accept="image/*"
onchange="handleImg(this)"
>

<button
onclick="addItem()"
class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase">
Agregar Ítem
</button>

</div>

<div id="items-list" class="space-y-2"></div>

<button
onclick="downloadPDF()"
class="w-full bg-emerald-500 py-6 rounded-2xl font-black text-lg uppercase">
Descargar PDF
</button>

</div>

<!-- PREVIEW -->

<div class="preview-column">

<div class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2 px-1">
Desliza la hoja hacia la derecha →
</div>

<div class="viewer-container">

<div class="viewer-inner">

<div id="pdf-canvas" class="pdf-page"></div>

</div>

</div>

</div>

</div>

</div>

<!-- ===================== -->
<!-- HISTORIAL -->
<!-- ===================== -->

<div id="sec-hist" class="tab-content">

<div id="history-content" class="space-y-4 max-w-2xl mx-auto"></div>

</div>

<!-- ===================== -->
<!-- SCRIPT -->
<!-- ===================== -->

<script>

let items=[];
let tempImg=null;

document.getElementById('q-date-input').valueAsDate=new Date();

/* ===================== */
/* HELPERS */
/* ===================== */

function money(v){
    return Number(v||0).toLocaleString('es-CL');
}

/* ===================== */
/* NAV */
/* ===================== */

function navTo(sec){

    ['edit','hist'].forEach(s=>{

        document.getElementById('sec-'+s)
        .classList.toggle('active',s===sec);

        const btn=document.getElementById('m-'+s);

        btn.className=s===sec
        ? 'flex-1 p-4 font-black text-[11px] uppercase tracking-widest text-blue-500 border-b-2 border-blue-500'
        : 'flex-1 p-4 font-black text-[11px] uppercase tracking-widest text-slate-500 border-b-2 border-transparent';

    });

    if(sec==='hist'){
        renderHistory();
    }
}

/* ===================== */
/* IMG */
/* ===================== */

function handleImg(i){

    if(i.files[0]){

        const r=new FileReader();

        r.onload=e=>{

            tempImg=e.target.result;

            renderPreview();
        };

        r.readAsDataURL(i.files[0]);
    }
}

/* ===================== */
/* ADD ITEM */
/* ===================== */

function addItem(){

    const name=document.getElementById('i-name').value.trim();

    const price=Number(document.getElementById('i-price').value);

    const qty=Number(document.getElementById('i-qty').value||1);

    if(!name || price<=0){
        return alert('Completa datos');
    }

    items.push({

        name,
        qty,
        price,
        total:qty*price,
        img:tempImg

    });

    document.getElementById('i-name').value='';
    document.getElementById('i-price').value='';
    document.getElementById('i-qty').value=1;
    document.getElementById('f-img').value='';

    tempImg=null;

    renderPreview();
}

/* ===================== */
/* HTML */
/* ===================== */

function getHTML(){

    const client=document.getElementById('q-client').value||'CLIENTE';
    const desc=document.getElementById('q-desc').value||'GENERAL';

    const neto=items.reduce((s,i)=>s+i.total,0);
    const iva=Math.round(neto*.19);
    const total=neto+iva;

    const rows=items.map(i=>`
    <tr>
        <td>${i.qty}</td>
        <td>${i.name}</td>
        <td style="text-align:center;">
            ${i.img ? `<img src="${i.img}" class="item-img">` : ''}
        </td>
        <td style="text-align:right;font-weight:900;">
            $${money(i.total)}
        </td>
    </tr>
    `).join('');

    return `
    <div class="quote-content">

        <div class="quote-header">

            <div>
                <img src="logo.png" class="quote-logo">
                <div style="font-size:9px;color:#64748b;font-weight:800;">
                    LABORATORIO DE IDEAS
                </div>
            </div>

            <div style="text-align:right;">

                <h2 style="font-size:18px;font-weight:900;margin:0;">
                    COTIZACIÓN
                </h2>

                <p style="font-size:11px;color:#64748b;">
                    ${new Date().toLocaleDateString('es-CL')}
                </p>

            </div>

        </div>

        <div class="client-box">

            <div>
                <p style="font-size:8px;color:#64748b;font-weight:900;">
                    Cliente
                </p>

                <b style="font-size:15px;">
                    ${client}
                </b>
            </div>

            <div style="text-align:right;">
                <p style="font-size:8px;color:#64748b;font-weight:900;">
                    Proyecto
                </p>

                <b style="font-size:13px;">
                    ${desc}
                </b>
            </div>

        </div>

        <table class="items-table">

            <thead>
                <tr>
                    <th>Cant</th>
                    <th>Descripción</th>
                    <th>Referencia</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody>

                ${rows}

            </tbody>

        </table>

        <div class="footer-box">

            <div style="display:flex;justify-content:space-between;align-items:flex-end;">

                <div class="payment-box">

                    <b>PAGO TRANSFERENCIA</b><br>

                    Banco Estado<br>

                    Eureka SPA

                </div>

                <div class="total-box">

                    <div>Neto: <b>$${money(neto)}</b></div>

                    <div>IVA: <b>$${money(iva)}</b></div>

                    <div class="final-total">

                        <span>TOTAL</span>

                        <h2>$${money(total)}</h2>

                    </div>

                </div>

            </div>

        </div>

    </div>
    `;
}

/* ===================== */
/* PREVIEW */
/* ===================== */

function renderPreview(){

    document.getElementById('pdf-canvas').innerHTML=getHTML();

    document.getElementById('items-list').innerHTML=items.map((i,x)=>`

    <div class="flex justify-between bg-slate-800 p-4 rounded-xl">

        <span>${i.name}</span>

        <button
        onclick="items.splice(${x},1);renderPreview();"
        class="text-red-500">
        ✕
        </button>

    </div>

    `).join('');
}

/* ===================== */
/* PDF */
/* ===================== */

async function downloadPDF(){

    const element=document.createElement('div');

    element.innerHTML=getHTML();

    element.style.width='210mm';
    element.style.height='297mm';
    element.style.background='white';

    document.body.appendChild(element);

    await html2pdf()
    .set({

        margin:0,

        filename:'cotizacion.pdf',

        image:{
            type:'jpeg',
            quality:0.98
        },

        html2canvas:{
            scale:2,
            backgroundColor:'#ffffff'
        },

        jsPDF:{
            unit:'mm',
            format:'a4',
            orientation:'portrait'
        }

    })
    .from(element)
    .save();

    document.body.removeChild(element);
}

/* ===================== */
/* QUICK VIEW */
/* ===================== */

function openQuickView(){

    document.getElementById('quick-view-modal')
    .style.display='flex';

    document.getElementById('cloned-pdf-target')
    .innerHTML=getHTML();
}

function closeQuickView(){

    document.getElementById('quick-view-modal')
    .style.display='none';
}

/* ===================== */
/* HISTORY */
/* ===================== */

function renderHistory(){

    document.getElementById('history-content').innerHTML=`

    <div class="bg-slate-800 p-5 rounded-2xl flex justify-between items-center">

        <div>

            <b>Vista previa actual</b>

        </div>

        <button
        onclick="openQuickView()"
        class="icon-btn">
        🔍
        </button>

    </div>
    `;
}

renderPreview();

</script>

</body>
</html>
