<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eureka! ERP v82</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc, getDoc, runTransaction };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            window.nextFolio = (d.exists()) ? Number(d.data().lastFolio) : 1000;
            if (typeof renderPreview === "function") renderPreview();
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.name || "").localeCompare(b.name || ""));
            if (typeof updateUI === "function") updateUI();
            if (typeof renderPreview === "function") renderPreview();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            if (typeof renderHistory === "function") renderHistory();
        });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; font-size: 16px; box-sizing: border-box; }
        .tab-content { display: none; width: 100%; padding: 20px; box-sizing: border-box; }
        .tab-content.active { display: block; }

        .pdf-page { 
            background: white !important; 
            color: #1e293b !important; 
            width: 210mm; 
            min-height: 297mm; 
            padding: 15mm; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            margin: 0 auto;
        }

        #preliminar-container {
            width: 100%;
            height: 72vh;
            min-height: 460px;
            overflow: hidden !important;
            padding: 0;
            background: #020617;
            position: relative !important;
            -webkit-overflow-scrolling: touch;
            touch-action: none !important;
            border-radius: 18px;
        }

        #pdf-preview-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: fit-content;
            transform-origin: 0 0;
            will-change: transform;
        }

        #pdf-canvas {
            zoom: 1 !important;
            transform: none !important;
            margin: 0 !important;
        }

        @media (max-width: 1024px) {
            #preliminar-container {
                height: 68vh;
                min-height: 460px;
            }
        }

        #quick-view-modal {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #020617;
            z-index: 99999;
            display: none;
            flex-direction: column;
        }

        #qv-header {
            background: #0f172a;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
        }

        #qv-body {
            flex: 1;
            overflow: hidden !important;
            padding: 0 !important;
            -webkit-overflow-scrolling: touch;
            background: #020617;
            position: relative !important;
            touch-action: none !important;
        }

        #cloned-pdf-wrapper {
            position: absolute !important;
            top: 0;
            left: 0;
            width: fit-content;
            margin: 0 !important;
            transform-origin: 0 0 !important;
            will-change: transform;
        }

        #cloned-pdf-wrapper .pdf-page {
            zoom: 1 !important;
            transform: none !important;
            margin: 0 !important;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: #1e293b;
            font-size: 20px;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="flex bg-slate-950 border-b border-slate-800 sticky top-0 z-[100]">
        <button onclick="navTo('edit')" id="m-edit" class="flex-1 p-4 font-black text-[11px] uppercase text-blue-500 border-b-2 border-blue-500">Cotizador</button>
        <button onclick="navTo('hist')" id="m-hist" class="flex-1 p-4 font-black text-[11px] uppercase text-slate-500 border-b-2 border-transparent">Historial</button>
        <button onclick="navTo('clients')" id="m-clients" class="flex-1 p-4 font-black text-[11px] uppercase text-slate-500 border-b-2 border-transparent">Clientes</button>
    </nav>
