<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eureka! Lab ERP v22</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
            authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
            projectId: "registro-de-gastos-a21e8",
            storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
            messagingSenderId: "947355933583",
            appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fb = { db, doc, updateDoc, increment, collection, addDoc, deleteDoc, setDoc };

        onSnapshot(doc(db, "config", "eureka_erp_v10"), (d) => {
            if(d.exists()) {
                window.currentFolio = d.data().lastFolio;
                renderPreview();
            }
        });

        onSnapshot(collection(db, "erp_clientes"), (s) => {
            window.clientes = s.docs.map(d => ({id: d.id, ...d.data()}));
            updateUI();
        });

        onSnapshot(collection(db, "erp_cotizaciones"), (s) => {
            window.historial = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.folio - a.folio);
            renderHistory();
        });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
        .input-dark { background: #1e293b; border: 1px solid #334155; padding: 14px; border-radius: 12px; width: 100%; color: white; font-size: 16px; }
        .input-dark:focus { border-color: #3b82f6; outline: none; }
        
        /* Contenedor de Previsualización */
        .preview-pane { background: #334155; display: flex; justify-content: center; padding: 10px; overflow-y: auto; }
        
        /* HOJA PDF DINÁMICA */
        #pdf-canvas { 
            background: white; color: #1e293b; width: 210mm; min-height: 297mm; 
            padding: 15mm; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.35); transform-origin: top center;
        }
        @media (min-width: 640px) { #pdf-canvas { transform: scale(0.5); } }
        @media (min-width: 1024px) { #pdf-canvas { transform: scale(0.75); } }

        .tab-btn { padding: 16px; flex: 1; text-align: center; font-weight: 800; font-size: 11px; color: #64748b; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: #1e293b; }
        
        /* Fix para evitar que el teclado tape botones en móvil */
        .panel-scroll { height: calc(100vh - 120px); overflow-y: auto; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="flex bg-slate-900 border-b border-slate-800 shrink-0">
        <button onclick="setTab('edit')" id="tab-edit" class="tab-btn tab-active">Cotizar</button>
        <button onclick="setTab('hist')" id="tab-hist" class="tab-btn">Historial</button>
        <button onclick="setTab('clients')" id="tab-clients" class="tab-btn">Clientes</button>
    </nav>

    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <aside class="lg:w-1/3 bg-slate-900 flex flex-col border-r border-slate-800">
            <div id="panel-edit" class="panel-scroll p-4 space-y-6">
                <section class="space-y-3">
                    <select id="q-client" class="input-dark" onchange="renderPreview()"></select>
                    <input type="text" id="q-desc" placeholder="Descripción del Folio" class="input-dark" oninput="renderPreview()">
                </section>

                <section class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 space-y-4">
                    <input type="text" id="i-name" placeholder="¿Qué estás vendiendo?" class="input-dark">
                    <div class="flex gap-2">
                        <input type="number" id="i-qty" value="1" class="input-dark text-center w-20">
                        <input type="number" id="i-price" placeholder="$ Precio" class="input-dark flex-1">
                        <button onclick="document.getElementById('f-img').click()" id="b-img" class="bg-slate-700 px-4 rounded-xl text-xl border border-slate-600">📷</button>
                    </div>
                    <input type="file" id="f-img" class="hidden" accept="image/*" onchange="handleImg(this)">
                    <button onclick="addItem()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-sm uppercase tracking-widest">+ AÑADIR ITEM</button>
                </section>

                <div id="items-list" class="space-y-2"></div>

                <div class="pt-4">
                    <button onclick="saveAndSend()" class="w-full bg-emerald-500 py-5 rounded-2xl font-black text-lg shadow-xl shadow-emerald-900/20 uppercase transition-all active:scale-95">GUARDAR Y ENVIAR</button>
                </div>
            </div>

            <div id="panel-hist" class="panel-scroll p-4 hidden space-y-4"></div>
            <div id="panel-clients" class="panel-scroll p-4 hidden space-y-4">
                <div class="flex gap-2"><input type="text" id="c-new" placeholder="Nombre Cliente" class="input-dark"><button onclick="addClient()" class="bg-blue-600 px-6 rounded-xl font-bold">+</button></div>
                <div id="clients-list" class="space-y-2"></div>
            </div>
        </aside>

        <main id="preview-pane" class="lg:w-2/3 preview-pane overflow-y-auto">
            <div id="pdf-canvas">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 4px solid #0f172a; padding-bottom: 20px; margin-bottom: 30px;">
                    <div style="width: 50%;">
                        <img src="logo.png" style="height: 100px; display: block;">
                        </div>
                    <div style="text-align: right; width: 45%;">
                        <h2 id="p-folio" style="font-size: 14px; font-weight: 800; margin: 0; color: #0f172a; text-transform: uppercase;">COT_EUREKALAB-1000</h2>
                        <div style="height: 2px; background: #0f172a; width: 100%; margin: 10px 0;"></div>
                        <p style="font-size: 12px; margin: 5px 0; color: #64748b;">FECHA: <span id="p-date" style="color: #0f172a; font-weight: 800;"></span></p>
                        <p style="font-size: 12px; margin: 0; color: #64748b;">CLIENTE: <span id="p-client" style="color: #0f172a; font-weight: 800; text-transform: uppercase;"></span></p>
                    </div>
                </div>

                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid #0f172a;">
                            <th style="padding: 15px 5px; text-align: left; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">DETALLE DEL SERVICIO</th>
                            <th style="padding: 15px 5px; text-align: center; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; width: 60px;">CANT</th>
                            <th style="padding: 15px 5px; text-align: right; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; width: 120px;">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="p-body"></tbody>
                </table>

                <div style="margin-top: 50px; text-align: right; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                    <p style="font-size: 11px; font-weight: 800; color: #94a3b8; margin: 0; text-transform: uppercase;">TOTAL INVERSIÓN NETO</p>
                    <h2 id="p-total" style="font-size: 48px; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -2px;">$0</h2>
                </div>
            </div>
        </main>
    </div>

    <script>
        let items = [], tempImg = null, editingId = null;

        function setTab(t) {
            ['edit', 'hist', 'clients'].forEach(s => {
                document.getElementById('panel-'+s).classList.toggle('hidden', s !== t);
                document.getElementById('tab-'+s).classList.toggle('active', s === t);
            });
            document.getElementById('preview-pane').classList.toggle('hidden', t !== 'edit');
        }

        function handleImg(input) {
            const reader = new FileReader();
            reader.onload = e => { tempImg = e.target.result; document.getElementById('b-img').innerHTML = "✅"; };
            reader.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const name = document.getElementById('i-name').value.toUpperCase();
            const price = Number(document.getElementById('i-price').value);
            const qty = Number(document.getElementById('i-qty').value);
            if(!name || price <= 0) return;
            items.push({ name, price, qty, total: price * qty, img: tempImg });
            document.getElementById('i-name').value = ""; document.getElementById('i-price').value = "";
            tempImg = null; document.getElementById('b-img').innerHTML = "📷";
            renderPreview();
        }

        function renderPreview() {
            document.getElementById('p-date').innerText = new Date().toLocaleDateString('es-CL');
            document.getElementById('p-client').innerText = document.getElementById('q-client').value || '---';
            const desc = document.getElementById('q-desc').value || 'S/D';
            const folioStr = `COT_EUREKALAB-${window.currentFolio || 1000} - ${desc.toUpperCase()}`;
            document.getElementById('p-folio').innerText = folioStr;

            const tbody = document.getElementById('p-body');
            tbody.innerHTML = items.map(it => `
                <tr style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 15px 5px; font-size: 13px; font-weight: 600;">
                        <div style="display:flex; align-items:center; gap:10px">
                            ${it.img ? `<img src="${it.img}" style="width:45px; height:45px; object-fit:cover; border-radius:8px">` : ''}
                            ${it.name}
                        </div>
                    </td>
                    <td style="padding: 15px 5px; text-align: center; font-weight: 600;">${it.qty}</td>
                    <td style="padding: 15px 5px; text-align: right; font-weight: 800; font-size: 15px;">$${it.total.toLocaleString('es-CL')}</td>
                </tr>
            `).join('');

            const total = items.reduce((s,i) => s + i.total, 0);
            document.getElementById('p-total').innerText = `$${total.toLocaleString('es-CL')}`;
            
            document.getElementById('items-list').innerHTML = items.map((it, i) => `
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl border border-slate-700 text-xs">
                    <span class="font-bold">${it.name}</span>
                    <button onclick="items.splice(${i},1); renderPreview();" class="text-red-400 font-bold px-3">✕</button>
                </div>`).join('');
        }

        async function saveAndSend() {
            const client = document.getElementById('q-client').value;
            const desc = document.getElementById('q-desc').value;
            if(!client || items.length === 0) return alert("Completa cliente y productos");

            const folioStr = `COT_EUREKALAB-${window.currentFolio} - ${desc.toUpperCase()}`;
            const data = { 
                folio: window.currentFolio, folioCode: folioStr, client, desc, 
                items: items.map(it => ({...it, img: it.img ? 'HAS_IMAGE' : null})), 
                total: items.reduce((s,i)=>s+i.total,0), date: new Date().toLocaleDateString('es-CL') 
            };

            if(editingId) {
                await fb.setDoc(fb.doc(fb.db, "erp_cotizaciones", editingId), data);
                editingId = null;
            } else {
                await fb.addDoc(fb.collection(fb.db, "erp_cotizaciones"), data);
                await fb.updateDoc(fb.doc(fb.db, "config", "eureka_erp_v10"), { lastFolio: fb.increment(1) });
            }

            const element = document.getElementById('pdf-canvas');
            const opt = { 
                margin: 0, filename: folioStr+'.pdf', image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            
            const blob = await html2pdf().from(element).set(opt).output('blob');
            const file = new File([blob], folioStr+'.pdf', { type: 'application/pdf' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: folioStr });
            } else {
                html2pdf().from(element).set(opt).save();
            }

            items = []; document.getElementById('q-desc').value = ""; 
            renderPreview();
            alert("Éxito. Folio guardado e incrementado.");
        }

        function updateUI() {
            const sel = document.getElementById('q-client');
            const curr = sel.value;
            sel.innerHTML = '<option value="">SELECCIONAR CLIENTE</option>';
            window.clientes.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
            sel.value = curr;

            document.getElementById('clients-list').innerHTML = window.clientes.map(c => `
                <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center border border-slate-700">
                    <span class="font-bold text-sm uppercase italic">${c.name}</span>
                    <div class="flex gap-4">
                        <button onclick="fb.deleteDoc(fb.doc(fb.db, 'erp_clientes', '${c.id}'))" class="text-red-500 font-bold text-xs">ELIMINAR</button>
                    </div>
                </div>`).join('');
        }

        async function addClient() {
            const n = document.getElementById('c-new').value.toUpperCase();
            if(n) { await fb.addDoc(fb.collection(fb.db, "erp_clientes"), { name: n }); document.getElementById('c-new').value = ""; }
        }

        function renderHistory() {
            document.getElementById('panel-hist').innerHTML = window.historial.map(h => `
                <div class="bg-slate-800 p-4 rounded-2xl border-l-8 border-blue-600 shadow-xl">
                    <p class="text-[9px] font-black opacity-40 uppercase mb-1">${h.folioCode}</p>
                    <p class="font-black text-sm uppercase italic tracking-tight">${h.client}</p>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-emerald-400 font-black tracking-widest">$${h.total.toLocaleString('es-CL')}</span>
                        <div class="flex gap-2">
                            <button onclick="loadEdit('${h.id}')" class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase">EDITAR</button>
                            <button onclick="fb.deleteDoc(fb.doc(fb.db, 'erp_cotizaciones', '${h.id}'))" class="bg-red-900/40 text-red-400 px-4 py-2 rounded-lg text-[10px] font-black uppercase">BORRAR</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function loadEdit(id) {
            const h = window.historial.find(x => x.id === id);
            items = [...h.items];
            document.getElementById('q-client').value = h.client;
            document.getElementById('q-desc').value = h.desc || "";
            editingId = id;
            setTab('edit');
            renderPreview();
        }
    </script>
</body>
</html>
