<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eureka! ERP v82</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    </head>
<body>

    <table style="width:100%; border-collapse:collapse;">
        <thead>
            <tr style="background:#0f172a; color:white; font-size:10px; text-transform:uppercase;">
                <th style="padding:12px 10px; width:50px;">Cant</th>
                <th style="padding:12px 10px; text-align:left;">Descripción</th>
                <th style="padding:12px 10px; width:100px; text-align:center;">P. Unit</th>
                <th style="padding:12px 10px; width:100px; text-align:center;">Imagen</th>
                <th style="padding:12px 10px; text-align:right; width:110px;">Total</th>
            </tr>
        </thead>
        <tbody id="p-body"></tbody>
    </table>

    <script>
        // --- FUNCIÓN RENDER PREVIEW (CORREGIDA PARA NO CONGELAR) ---
        function renderPreview() {
            const f = editingId ? window.currentFolio : (window.nextFolio || 1000);
            document.getElementById('p-folio').innerText = `COT-${f} | ${document.getElementById('q-desc').value.toUpperCase() || 'GENERAL'}`;
            
            // Usamos un mapeo directo para evitar bucles pesados innecesarios
            document.getElementById('p-body').innerHTML = items.map(it => `
                <tr>
                    <td style="padding:10px; text-align:center; font-weight:700;">${it.qty}</td>
                    <td style="padding:10px; font-size:13px;">${it.name}</td>
                    <td style="padding:10px; text-align:center;">${formatCLP(it.price)}</td>
                    <td style="padding:10px; text-align:center;">${it.img ? `<img src="${it.img}" style="max-height:40px; max-width:40px; object-fit:contain;">` : ''}</td>
                    <td style="padding:10px; text-align:right; font-weight:800;">${formatCLP(it.total)}</td>
                </tr>
            `).join('');

            // Recalculo rápido de totales
            const n = items.reduce((s,i) => s + i.total, 0), v = Math.round(n * 0.19);
            document.getElementById('p-sub').innerText = formatCLP(n);
            document.getElementById('p-iva').innerText = formatCLP(v);
            document.getElementById('p-total').innerText = formatCLP(n + v);
            
            // Forzar refresco del zoom táctil de forma asíncrona
            setTimeout(() => initCotizadorZoom(false), 50);
        }

        // --- FUNCIÓN DRAW TABLE HEADER (PDF) ---
        function drawTableHeader() {
            pdf.setFillColor(15, 23, 42);
            pdf.rect(m, y, contentW, 9, 'F');
            pdf.setFontSize(7);
            pdf.setTextColor(255, 255, 255);
            pdf.text("CANT", m + 4, y + 6);
            pdf.text("DESCRIPCIÓN", m + 22, y + 6);
            pdf.text("P. UNIT", m + 115, y + 6, { align: 'right' });
            pdf.text("IMAGEN", m + 125, y + 6);
            pdf.text("TOTAL", pageW - m - 3, y + 6, { align: 'right' });
            y += 9;
        }

        // --- FUNCIÓN DRAW ITEM ROW (PDF) ---
        // Asegúrate de añadir esta línea dentro de tu ciclo while:
        if(part === 0) {
            pdf.setFont(undefined, 'normal');
            pdf.text(money(it.price), m + 124, y + 8, { align: 'right' });
        }
    </script>
</body>
</html>
